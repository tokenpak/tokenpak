[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "langchain-tokenpak"
version = "0.1.0"
description = "TokenPak integration for LangChain — automatic context compression for RAG and chat chains"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
authors = [
  { name = "TokenPak Team" }
]
keywords = ["langchain", "rag", "compression", "context", "tokens", "llm"]
classifiers = [
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "License :: OSI Approved :: MIT License",
  "Intended Audience :: Developers",
  "Topic :: Software Development :: Libraries",
  "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
  "tokenpak>=0.1.0",
  "langchain-core>=0.1.0",
]

[project.optional-dependencies]
dev = ["pytest>=7.0", "pytest-asyncio>=0.21.0"]
all = ["langchain>=0.1.0"]

[project.urls]
"Homepage" = "https://github.com/tokenpak/langchain-tokenpak"
"Documentation" = "https://tokenpak.dev/integrations/langchain"
"Repository" = "https://github.com/tokenpak/langchain-tokenpak.git"
"Bug Tracker" = "https://github.com/tokenpak/langchain-tokenpak/issues"

[tool.setuptools.packages.find]
where = ["."]
include = ["langchain_tokenpak*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
asyncio_mode = "auto"
