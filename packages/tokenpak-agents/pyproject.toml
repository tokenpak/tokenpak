[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "tokenpak-agents"
version = "0.1.0"
description = "Unified TokenPak integrations for CrewAI, AutoGen, and Semantic Kernel"
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "TokenPak Team" }]
dependencies = ["tokenpak-sdk>=0.1.0"]

[project.optional-dependencies]
crewai = ["crewai>=0.1.0"]
autogen = ["pyautogen>=0.2.0"]
semantic-kernel = ["semantic-kernel>=0.4.0"]
dev = [
  "pytest>=7.0",
  "pytest-asyncio>=0.21.0",
  "pytest-mock>=3.0.0",
]
all = [
  "crewai>=0.1.0",
  "pyautogen>=0.2.0",
  "semantic-kernel>=0.4.0",
  "pytest>=7.0",
  "pytest-asyncio>=0.21.0",
  "pytest-mock>=3.0.0",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["tokenpak_agents*"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
python_files = ["test_*.py"]
