[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "crewai-tokenpak"
version = "0.1.0"
description = "TokenPak integration for CrewAI — automatic context compression for multi-agent systems"
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.10"
authors = [
  { name = "TokenPak Team" }
]
keywords = ["crewai", "agents", "compression", "context", "tokens", "multi-agent"]
classifiers = [
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Intended Audience :: Developers",
  "Topic :: Software Development :: Libraries",
  "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
  "tokenpak>=0.1.0",
  "crewai>=0.1.0",
]

[project.optional-dependencies]
dev = ["pytest>=7.0", "pytest-asyncio>=0.21.0", "mypy>=1.9.0"]

[project.urls]
"Homepage" = "https://github.com/tokenpak/crewai-tokenpak"
"Documentation" = "https://tokenpak.dev/integrations/crewai"
"Repository" = "https://github.com/tokenpak/crewai-tokenpak.git"
"Bug Tracker" = "https://github.com/tokenpak/crewai-tokenpak/issues"

[tool.setuptools.packages.find]
where = ["."]
include = ["crewai_tokenpak*"]

[tool.mypy]
python_version = "3.10"
strict = true
files = ["crewai_tokenpak"]
follow_imports = "skip"
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
asyncio_mode = "auto"
