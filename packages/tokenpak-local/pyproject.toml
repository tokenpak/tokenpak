[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "tokenpak-local"
version = "0.1.0"
description = "TokenPak integration for local LLMs — Ollama, LM Studio, and OpenAI-compatible endpoints"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
authors = [
  { name = "TokenPak Team" }
]
keywords = ["tokenpak", "ollama", "lmstudio", "local-llm", "compression", "context", "rag"]
classifiers = [
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "License :: OSI Approved :: MIT License",
  "Intended Audience :: Developers",
  "Topic :: Software Development :: Libraries",
  "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
  "tokenpak-sdk>=0.1.0",
]

[project.optional-dependencies]
ollama = ["ollama>=0.2.0"]
openai = ["openai>=1.0.0"]
dev = ["pytest>=7.0", "pytest-asyncio>=0.21.0", "pytest-mock>=3.12.0"]
all = ["ollama>=0.2.0", "openai>=1.0.0"]

[project.urls]
"Homepage" = "https://github.com/tokenpak/tokenpak-local"
"Documentation" = "https://tokenpak.dev/integrations/local-llm"
"Repository" = "https://github.com/tokenpak/tokenpak-local.git"
"Bug Tracker" = "https://github.com/tokenpak/tokenpak-local/issues"

[tool.setuptools.packages.find]
where = ["."]
include = ["tokenpak_local*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
asyncio_mode = "auto"
