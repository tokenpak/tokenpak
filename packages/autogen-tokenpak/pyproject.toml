[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "autogen-tokenpak"
version = "0.1.0"
description = "TokenPak integration for Microsoft AutoGen — automatic context compression for multi-agent conversations"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [
  { name = "TokenPak Team" }
]
keywords = ["autogen", "agents", "compression", "context", "tokens", "multi-agent"]
classifiers = [
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Intended Audience :: Developers",
  "Topic :: Software Development :: Libraries",
  "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
  "tokenpak>=0.1.0",
  "pyautogen>=0.2.0",
]

[project.optional-dependencies]
dev = ["pytest>=7.0", "pytest-asyncio>=0.21.0", "mypy>=1.9.0"]

[project.urls]
"Homepage" = "https://github.com/tokenpak/autogen-tokenpak"
"Documentation" = "https://tokenpak.dev/integrations/autogen"
"Repository" = "https://github.com/tokenpak/autogen-tokenpak.git"
"Bug Tracker" = "https://github.com/tokenpak/autogen-tokenpak/issues"

[tool.setuptools.packages.find]
where = ["."]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_any_generics = true
no_implicit_optional = true
strict_equality = true
strict_optional = true
