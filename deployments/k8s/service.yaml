apiVersion: v1
kind: Service
metadata:
  name: tokenpak
  namespace: tokenpak
  labels:
    app: tokenpak
spec:
  selector:
    app: tokenpak
  ports:
    - name: proxy
      port: 8766
      targetPort: 8766
      protocol: TCP
  type: ClusterIP
---
