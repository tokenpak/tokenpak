# ⚠️  IMPORTANT: Do NOT commit this file with real API keys.
# Use kubectl create secret or a secrets manager instead.
# This file is provided as a template only.
#
# To create the secret from the command line (preferred):
#   kubectl create secret generic tokenpak-secrets \
#     --from-literal=anthropic_api_key=sk-ant-... \
#     --from-literal=openai_api_key=sk-... \
#     --namespace=tokenpak
#
# Or apply this template after base64-encoding your keys:
#   echo -n 'sk-ant-...' | base64

apiVersion: v1
kind: Secret
metadata:
  name: tokenpak-secrets
  namespace: tokenpak
type: Opaque
data:
  # base64-encoded API keys
  # echo -n 'sk-ant-REPLACE_ME' | base64
  anthropic_api_key: ""
  openai_api_key: ""
  google_api_key: ""
