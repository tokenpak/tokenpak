apiVersion: apps/v1
kind: Deployment
metadata:
  name: tokenpak
  namespace: tokenpak
  labels:
    app: tokenpak
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tokenpak
  template:
    metadata:
      labels:
        app: tokenpak
    spec:
      # Run as non-root user (matches Dockerfile USER tokenpak)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: tokenpak
          image: tokenpak:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8766
              name: proxy
          env:
            - name: TOKENPAK_PORT
              value: "8766"
            - name: TOKENPAK_LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: tokenpak-config
                  key: log_level
            - name: TOKENPAK_MODE
              valueFrom:
                configMapKeyRef:
                  name: tokenpak-config
                  key: mode
            # API keys from Secret
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: tokenpak-secrets
                  key: anthropic_api_key
                  optional: true
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: tokenpak-secrets
                  key: openai_api_key
                  optional: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8766
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8766
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: tokenpak-data
              mountPath: /root/.tokenpak
      volumes:
        - name: tokenpak-data
          persistentVolumeClaim:
            claimName: tokenpak-pvc
