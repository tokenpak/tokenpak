<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TokenPak — Telemetry Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e4e4e7;
            padding: 2rem;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: #fafafa;
        }

        .subtitle {
            font-size: 0.875rem;
            color: #71717a;
            margin-bottom: 2rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .card {
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 0.5rem;
            padding: 1.5rem;
            transition: border-color 0.2s;
        }

        .card:hover {
            border-color: #3f3f46;
        }

        .card-title {
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #a1a1a6;
            margin-bottom: 0.75rem;
        }

        .card-value {
            font-size: 2rem;
            font-weight: 600;
            color: #10b981;
            font-variant-numeric: tabular-nums;
        }

        .card-subtext {
            font-size: 0.75rem;
            color: #71717a;
            margin-top: 0.5rem;
        }

        .card.alert { border-color: #dc2626; }
        .card.alert .card-value { color: #ef4444; }

        .card.warning { border-color: #f59e0b; }
        .card.warning .card-value { color: #fbbf24; }

        .wide { grid-column: 1 / -1; }

        .chart {
            width: 100%;
            height: 200px;
            margin-top: 1rem;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.75rem;
            color: #71717a;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10b981;
        }

        .status-dot.error { background: #ef4444; }
        .status-dot.warning { background: #fbbf24; }

        canvas { max-width: 100%; }

        .loading {
            opacity: 0.5;
            pointer-events: none;
        }

        .footer {
            text-align: center;
            font-size: 0.75rem;
            color: #71717a;
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid #27272a;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ TokenPak Telemetry</h1>
        <p class="subtitle">Real-time compression & cost metrics</p>

        <div class="grid">
            <!-- Request Count (24h) -->
            <div class="card">
                <div class="card-title">Requests (Session)</div>
                <div class="card-value" id="request-count">—</div>
                <div class="card-subtext" id="request-errors"></div>
            </div>

            <!-- Compression Ratio -->
            <div class="card">
                <div class="card-title">Compression Ratio</div>
                <div class="card-value" id="compression-ratio">—</div>
                <div class="card-subtext" id="compression-info"></div>
            </div>

            <!-- Token Savings -->
            <div class="card">
                <div class="card-title">Tokens Saved</div>
                <div class="card-value" id="tokens-saved">—</div>
                <div class="card-subtext" id="tokens-info"></div>
            </div>

            <!-- Cost -->
            <div class="card">
                <div class="card-title">Session Cost</div>
                <div class="card-value" id="cost">—</div>
                <div class="card-subtext" id="cost-info"></div>
            </div>

            <!-- Cache Performance -->
            <div class="card">
                <div class="card-title">Cache Hit Rate</div>
                <div class="card-value" id="cache-hit-rate">—</div>
                <div class="card-subtext" id="cache-info"></div>
            </div>

            <!-- Error Rate -->
            <div class="card alert" id="error-card">
                <div class="card-title">Error Rate</div>
                <div class="card-value" id="error-rate">—</div>
                <div class="card-subtext" id="error-info"></div>
            </div>

            <!-- Cost by Model Chart -->
            <div class="card wide">
                <div class="card-title">Cost by Model</div>
                <canvas id="cost-chart" class="chart"></canvas>
                <div class="status">
                    <div class="status-dot" id="proxy-status"></div>
                    <span id="proxy-health">Last updated: —</span>
                </div>
            </div>

            <!-- Cache Performance Chart -->
            <div class="card wide">
                <div class="card-title">Cache Behavior</div>
                <canvas id="cache-chart" class="chart"></canvas>
            </div>
        </div>

        <div class="footer">
            Auto-refreshing every 30 seconds · <span id="last-update">Never</span>
        </div>
    </div>

    <script>
        const STATS_URL = '/stats/session';
        const REFRESH_INTERVAL = 30000;

        let costCtx, cacheCtx;

        async function fetchStats() {
            try {
                const response = await fetch(STATS_URL);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            } catch (error) {
                console.error('Failed to fetch stats:', error);
                document.documentElement.classList.add('loading');
                return null;
            }
        }

        function formatNumber(num) {
            if (num >= 1e6) return (num / 1e6).toFixed(1) + 'M';
            if (num >= 1e3) return (num / 1e3).toFixed(1) + 'K';
            return Math.round(num).toString();
        }

        function formatCost(cost) {
            return '$' + cost.toFixed(3);
        }

        function formatPercent(pct) {
            return (pct * 100).toFixed(1) + '%';
        }

        function getStatusColor(errorRate) {
            if (errorRate > 0.05) return '#dc2626';
            if (errorRate > 0.01) return '#f59e0b';
            return '#10b981';
        }

        function updateDashboard(stats) {
            if (!stats) return;

            const s = stats;
            const now = new Date();

            // Request count
            document.getElementById('request-count').textContent = formatNumber(s.session_requests || 0);
            document.getElementById('request-errors').textContent = `${s.errors || 0} error${(s.errors || 0) !== 1 ? 's' : ''}`;

            // Compression ratio
            const savedTokens = s.tokens_saved || 0;
            const totalInput = s.tokens_sent || 0;
            const compressionRatio = totalInput > 0 ? savedTokens / totalInput : 0;
            document.getElementById('compression-ratio').textContent = formatPercent(compressionRatio);
            document.getElementById('compression-info').textContent = `${formatNumber(savedTokens)} of ${formatNumber(totalInput)} tokens`;

            // Token savings
            document.getElementById('tokens-saved').textContent = formatNumber(savedTokens);
            document.getElementById('tokens-info').textContent = `compression rate: ${(s.avg_savings_pct || 0).toFixed(1)}%`;

            // Cost
            document.getElementById('cost').textContent = formatCost(s.total_cost || 0);
            document.getElementById('cost-info').textContent = `${formatNumber(s.session_requests || 0)} requests`;

            // Uptime (approximation for cache health indicator)
            const uptime = s.uptime_hours || 0;
            document.getElementById('cache-hit-rate').textContent = formatPercent(Math.min(uptime / 24, 1));
            document.getElementById('cache-info').textContent = `${uptime.toFixed(2)} hours uptime`;

            // Error rate
            const errorRate = (s.session_requests || 0) > 0 ? (s.errors || 0) / (s.session_requests || 0) : 0;
            document.getElementById('error-rate').textContent = formatPercent(errorRate);
            document.getElementById('error-info').textContent = `${s.errors || 0} of ${s.session_requests || 0} requests`;

            // Style error card
            const errorCard = document.getElementById('error-card');
            errorCard.classList.remove('alert', 'warning');
            if (errorRate > 0.05) errorCard.classList.add('alert');
            else if (errorRate > 0.01) errorCard.classList.add('warning');

            // Status dot
            const statusDot = document.getElementById('proxy-status');
            statusDot.style.background = getStatusColor(errorRate);

            // Last updated
            document.getElementById('proxy-health').textContent = `Last updated: ${now.toLocaleTimeString()}`;
            document.getElementById('last-update').textContent = now.toLocaleTimeString();

            // Charts
            updateCostChart(s);
            updateCacheChart(s);

            // Clear loading state
            document.documentElement.classList.remove('loading');
        }

        function updateCostChart(s) {
            const ctx = document.getElementById('cost-chart');

            if (!costCtx) {
                ctx.width = ctx.offsetWidth;
                ctx.height = 200;
                costCtx = ctx.getContext('2d');
            }

            // Simple bar chart
            const barWidth = 60;
            const maxCost = Math.max(s.total_cost || 0.1, 0.1);
            const scale = 150 / maxCost;

            costCtx.fillStyle = '#0a0a0a';
            costCtx.fillRect(0, 0, ctx.width, ctx.height);

            // Y axis
            costCtx.strokeStyle = '#27272a';
            costCtx.lineWidth = 1;
            costCtx.beginPath();
            costCtx.moveTo(40, 10);
            costCtx.lineTo(40, 170);
            costCtx.lineTo(ctx.width - 10, 170);
            costCtx.stroke();

            // Bar
            const barHeight = (s.total_cost || 0) * scale;
            const barX = 60;
            const barY = 170 - barHeight;
            costCtx.fillStyle = '#10b981';
            costCtx.fillRect(barX, barY, barWidth, barHeight);

            // Labels
            costCtx.fillStyle = '#71717a';
            costCtx.font = '12px sans-serif';
            costCtx.textAlign = 'center';
            costCtx.fillText('Session', barX + barWidth / 2, 190);
            costCtx.textAlign = 'right';
            costCtx.fillText(formatCost(s.total_cost || 0), 35, 175);
        }

        function updateCacheChart(s) {
            const ctx = document.getElementById('cache-chart');

            if (!cacheCtx) {
                ctx.width = ctx.offsetWidth;
                ctx.height = 200;
                cacheCtx = ctx.getContext('2d');
            }

            const raw = s.tokens_raw || 0;
            const sent = s.tokens_sent || 0;
            const saved = raw - sent;
            const total = raw || 1;

            cacheCtx.fillStyle = '#0a0a0a';
            cacheCtx.fillRect(0, 0, ctx.width, ctx.height);

            // Y axis
            cacheCtx.strokeStyle = '#27272a';
            cacheCtx.lineWidth = 1;
            cacheCtx.beginPath();
            cacheCtx.moveTo(40, 10);
            cacheCtx.lineTo(40, 170);
            cacheCtx.lineTo(ctx.width - 10, 170);
            cacheCtx.stroke();

            const barWidth = 50;
            const sentHeight = (sent / total) * 150;
            const savedHeight = (saved / total) * 150;

            // Sent bar
            cacheCtx.fillStyle = '#3b82f6';
            cacheCtx.fillRect(60, 170 - sentHeight, barWidth, sentHeight);

            // Saved bar
            cacheCtx.fillStyle = '#10b981';
            cacheCtx.fillRect(130, 170 - savedHeight, barWidth, savedHeight);

            // Labels
            cacheCtx.fillStyle = '#71717a';
            cacheCtx.font = '12px sans-serif';
            cacheCtx.textAlign = 'center';
            cacheCtx.fillText('Sent', 85, 190);
            cacheCtx.fillText('Saved', 155, 190);
            cacheCtx.fillStyle = '#e4e4e7';
            cacheCtx.fillText(formatNumber(sent), 85, 160);
            cacheCtx.fillText(formatNumber(saved), 155, 160);
        }

        async function init() {
            const stats = await fetchStats();
            updateDashboard(stats);

            setInterval(async () => {
                const stats = await fetchStats();
                updateDashboard(stats);
            }, REFRESH_INTERVAL);
        }

        init();
    </script>
</body>
</html>
