<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}TokenPak Dashboard{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@1.9.12" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg:#0f1117; --surface:#1a1d27; --surface2:#23273a; --border:#2e3347;
      --text:#e2e8f0; --muted:#7c8ba1; --accent:#6c8bff;
      --green:#4ade80; --amber:#fbbf24; --red:#f87171; --radius:8px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;line-height:1.5}
    a{color:var(--accent);text-decoration:none}
    a:hover{text-decoration:underline}
    .layout{display:flex;min-height:100vh}
    .sidebar{width:220px;min-width:220px;background:var(--surface);border-right:1px solid var(--border);padding:24px 16px;display:flex;flex-direction:column;gap:8px}
    .sidebar .brand{font-size:16px;font-weight:700;color:var(--accent);margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--border)}
    .sidebar .brand span{color:var(--muted);font-weight:400;font-size:12px;display:block}
    .nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius);color:var(--muted);font-weight:500;transition:all 0.15s}
    .nav-item:hover,.nav-item.active{background:var(--surface2);color:var(--text);text-decoration:none}
    .nav-item.active{color:var(--accent)}
    .main{flex:1;padding:28px 32px;overflow-y:auto}
    .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
    .page-title{font-size:20px;font-weight:700}
    .page-subtitle{color:var(--muted);font-size:13px;margin-top:2px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
    .card-title{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:12px}
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
    .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
    .stat-label{font-size:12px;color:var(--muted);font-weight:500;margin-bottom:8px}
    .stat-value{font-size:28px;font-weight:700;color:var(--text);line-height:1}
    .stat-sub{font-size:12px;color:var(--muted);margin-top:4px}
    .stat-accent{color:var(--accent)} .stat-green{color:var(--green)} .stat-amber{color:var(--amber)}
    .table-wrap{overflow-x:auto}
    table{width:100%;border-collapse:collapse}
    th{text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);padding:8px 12px;border-bottom:1px solid var(--border)}
    td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text)}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:var(--surface2)}
    .rank{color:var(--muted);font-size:12px}
    .agent-badge{display:inline-block;padding:2px 8px;background:var(--surface2);border-radius:99px;font-size:12px;font-family:monospace}
    .controls{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:24px}
    .controls label{font-size:12px;color:var(--muted);font-weight:500}
    .controls input,.controls select{background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);padding:7px 12px;font-size:13px;outline:none}
    .controls input:focus,.controls select:focus{border-color:var(--accent)}
    .btn{background:var(--accent);color:#fff;border:none;border-radius:var(--radius);padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s}
    .btn:hover{opacity:.85}
    .btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
    .chart-wrap{position:relative;height:280px}
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px}
    @media(max-width:900px){.two-col{grid-template-columns:1fr}}
    .sort-link{color:var(--muted)}
    .sort-link.active{color:var(--accent)}
  </style>
  {% block head_extra %}{% endblock %}
</head>
<body>
<div class="layout">
  <nav class="sidebar">
    <div class="brand">
      📊 TokenPak
      <span>Usage Analytics</span>
    </div>
    <a href="/dashboard" class="nav-item {% block nav_overview %}{% endblock %}">
      <span>🏠</span> Overview
    </a>
    <a href="/dashboard/time-series" class="nav-item {% block nav_timeseries %}{% endblock %}">
      <span>📈</span> Time Series
    </a>
    <a href="/dashboard/agents" class="nav-item {% block nav_agents %}{% endblock %}">
      <span>🤖</span> Agents
    </a>
    <div style="flex:1"></div>
    <a href="/docs" class="nav-item" target="_blank">
      <span>📖</span> API Docs
    </a>
  </nav>
  <main class="main">
    {% block content %}{% endblock %}
  </main>
</div>
</body>
</html>
