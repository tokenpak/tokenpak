name: cp-git-diff-compression
category: common_patterns
description: Keep diff hunks but drop unchanged context lines beyond 2 lines.
pattern:
  match: content
  keywords:
  - diff --git
  - '@@'
  - +++
  - '---'
action:
  operations:
  - type: git_diff_compress
    context_lines: 2
    keep_headers: true
  compression_hint: 0.35
