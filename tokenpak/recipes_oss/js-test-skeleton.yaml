name: js-test-skeleton
category: javascript
description: Keep describe/it/test block structure; replace test bodies with a stub.
pattern:
  match: extension
  extensions:
  - .test.js
  - .spec.js
  - .test.ts
  - .spec.ts
action:
  operations:
  - type: js_stub_test_bodies
    keep_describe_structure: true
    stub_body: '{ /* test body */ }'
  compression_hint: 0.65
