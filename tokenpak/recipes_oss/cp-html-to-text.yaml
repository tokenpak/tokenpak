name: cp-html-to-text
category: common_patterns
description: Strip HTML tags and extract readable text content.
pattern:
  match: extension
  extensions:
  - .html
  - .htm
  - .xhtml
action:
  operations:
  - type: regex_replace
    pattern: <script[^>]*>[\s\S]*?</script>
    replacement: ''
    flags: ignorecase
  - type: regex_replace
    pattern: <style[^>]*>[\s\S]*?</style>
    replacement: ''
    flags: ignorecase
  - type: regex_replace
    pattern: <[^>]+>
    replacement: ''
  - type: regex_replace
    pattern: '&[a-zA-Z]+;'
    replacement: ' '
  - type: regex_replace
    pattern: \n{3,}
    replacement: '


      '
  compression_hint: 0.7
