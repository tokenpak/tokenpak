name: py-class-hierarchy-flatten
category: python
description: Extract class names, base classes, and method signatures; drop implementation bodies.
pattern:
  match: extension
  extensions:
  - .py
action:
  operations:
  - type: python_class_stub
    keep_class_docstring: true
    stub_methods: true
    stub_body: '...'
  compression_hint: 0.65
