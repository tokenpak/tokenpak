name: cp-log-output-compression
category: common_patterns
description: Deduplicate repeated log lines, replacing runs with a count annotation.
pattern:
  match: content
  keywords:
  - INFO
  - DEBUG
  - WARNING
  - ERROR
  - CRITICAL
action:
  operations:
  - type: dedup_repeated_lines
    min_run: 3
    annotation: ' (×{count})'
  compression_hint: 0.4
