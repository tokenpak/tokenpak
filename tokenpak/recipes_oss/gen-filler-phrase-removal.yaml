name: gen-filler-phrase-removal
category: general
description: Remove common filler phrases that add no semantic value.
pattern:
  match: any
action:
  operations:
  - type: regex_replace
    pattern: (?i)\b(please note that|it(?:'s| is) important to note that|it should be noted that|as you can see|essentially|basically|obviously|clearly|of
      course|needless to say)\b[,\s]*
    replacement: ''
  compression_hint: 0.03
