name: py-decorator-body-removal
category: python
description: Keep decorator lines and function signature; replace body with `...`.
pattern:
  match: extension
  extensions:
  - .py
action:
  operations:
  - type: python_stub_functions
    keep_decorators: true
    keep_type_hints: false
    stub_body: '...'
  compression_hint: 0.55
