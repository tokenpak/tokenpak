name: py-fstring-simplification
category: python
description: Collapse simple f-strings with only one variable to a format hint `{var}`.
pattern:
  match: extension
  extensions:
  - .py
action:
  operations:
  - type: regex_replace
    pattern: f"([^"{}]*)\{(\w+)\}([^"{}]*)"
    replacement: '"\1{\2}\3" # f-str'
  compression_hint: 0.03
