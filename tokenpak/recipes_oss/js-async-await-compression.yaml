name: js-async-await-compression
category: javascript
description: 'Collapse async/await boilerplate: replace try/catch-wrapped await blocks with a summary.'
pattern:
  match: extension
  extensions:
  - .js
  - .jsx
  - .ts
  - .tsx
  - .mjs
action:
  operations:
  - type: js_compress_try_catch
    keep_await_line: true
    stub_catch: catch (e) { /* error handled */ }
  compression_hint: 0.2
