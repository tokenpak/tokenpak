name: py-type-hint-body-removal
category: python
description: Preserve function/method signatures with type hints but replace bodies with `...`.
pattern:
  match: extension
  extensions:
  - .py
action:
  operations:
  - type: python_stub_functions
    keep_decorators: true
    keep_type_hints: true
    stub_body: '...'
  compression_hint: 0.6
