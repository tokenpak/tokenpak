name: py-comment-density-reduction
category: python
description: Remove inline comments; keep only module/class/function-level block comments.
pattern:
  match: extension
  extensions:
  - .py
action:
  operations:
  - type: regex_replace
    pattern: (?m)(\s+)#(?!:)(?! type:)(?! noqa)(?! pragma).*$
    replacement: ''
  compression_hint: 0.1
