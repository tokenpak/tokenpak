name: cfg-docker-trimming
category: config
description: Remove comments and blank lines from Dockerfiles and docker-compose files.
pattern:
  match: filename
  filenames:
  - Dockerfile
  - docker-compose.yml
  - docker-compose.yaml
  - docker-compose.override.yml
action:
  operations:
  - type: remove_lines
    condition: comment_only
  - type: regex_replace
    pattern: \n{3,}
    replacement: '


      '
  compression_hint: 0.2
