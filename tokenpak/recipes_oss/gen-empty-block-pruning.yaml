name: gen-empty-block-pruning
category: general
description: Remove blocks that contain only whitespace or empty lines.
pattern:
  match: any
action:
  operations:
  - type: regex_replace
    pattern: \n(\s*\n){3,}
    replacement: '


      '
  - type: remove_lines
    condition: blank_only
  compression_hint: 0.08
