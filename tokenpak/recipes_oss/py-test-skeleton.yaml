name: py-test-skeleton
category: python
description: Keep test function names and class names; replace bodies with `...`.
pattern:
  match: extension
  extensions:
  - .py
  keywords:
  - def test_
  - class Test
action:
  operations:
  - type: python_stub_functions
    function_pattern: def test_
    keep_decorators: true
    stub_body: '...'
  compression_hint: 0.7
