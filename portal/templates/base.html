<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}TokenPak Portal{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #e8e8e8; min-height: 100vh; }
    a { color: #6ee7b7; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .nav { display: flex; align-items: center; justify-content: space-between; padding: 1rem 2rem; border-bottom: 1px solid #222; background: #111; }
    .nav-brand { font-weight: 700; font-size: 1.1rem; color: #fff; letter-spacing: -0.02em; }
    .nav-brand span { color: #6ee7b7; }
    .nav-links a { margin-left: 1.5rem; color: #aaa; font-size: 0.9rem; }
    .nav-links a:hover { color: #fff; }
    .container { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }
    .card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px; padding: 1.5rem; margin-bottom: 1.5rem; }
    .card-title { font-size: 1rem; font-weight: 600; color: #fff; margin-bottom: 1rem; }
    .badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 999px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
    .badge-oss { background: #1e3a2f; color: #6ee7b7; }
    .badge-pro { background: #1e2a4a; color: #93c5fd; }
    .badge-team { background: #2a1e4a; color: #c4b5fd; }
    .btn { display: inline-block; padding: 0.6rem 1.2rem; border-radius: 6px; font-size: 0.9rem; font-weight: 600; cursor: pointer; border: none; text-decoration: none; }
    .btn-primary { background: #6ee7b7; color: #111; }
    .btn-primary:hover { background: #5dd6a6; text-decoration: none; }
    .btn-danger { background: #3d1515; color: #f87171; border: 1px solid #5a2020; }
    .btn-ghost { background: transparent; color: #aaa; border: 1px solid #333; }
    .btn-ghost:hover { border-color: #555; color: #fff; text-decoration: none; }
    .key-token { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.85rem; background: #111; padding: 0.5rem 0.8rem; border-radius: 6px; border: 1px solid #2a2a2a; color: #6ee7b7; letter-spacing: 0.05em; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 0.75rem 1rem; border-bottom: 1px solid #222; font-size: 0.9rem; }
    th { color: #777; font-weight: 500; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; }
    tr:last-child td { border-bottom: none; }
    .empty-state { text-align: center; padding: 3rem; color: #555; }
    .alert { padding: 0.8rem 1rem; border-radius: 6px; margin-bottom: 1rem; font-size: 0.9rem; }
    .alert-info { background: #1e2a4a; border: 1px solid #2a3a6a; color: #93c5fd; }
    .alert-warn { background: #2a2010; border: 1px solid #4a3a10; color: #fcd34d; }
    footer { text-align: center; padding: 2rem; color: #444; font-size: 0.8rem; border-top: 1px solid #1a1a1a; margin-top: 3rem; }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-brand">Token<span>Pak</span></div>
    <div class="nav-links">
      {% if session.customer_id %}
        <a href="/dashboard">Dashboard</a>
        <a href="/keys">Keys</a>
        <a href="/team">Team</a>
        <a href="/portal">Billing</a>
      {% else %}
        <a href="https://github.com/kaywhy331/tokenpak">GitHub</a>
        <a href="/pricing">Pricing</a>
      {% endif %}
    </div>
  </nav>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
  <footer>TokenPak &copy; 2026 — <a href="https://github.com/kaywhy331/tokenpak">Open Source</a> · MIT License</footer>
</body>
</html>
