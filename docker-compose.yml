# TokenPak Docker Compose Configuration
# Quick start: docker compose up -d
# With Redis cache: docker compose --profile with-cache up -d

services:
  tokenpak:
    build:
      context: .
      dockerfile: Dockerfile
    image: tokenpak:latest
    container_name: tokenpak-proxy
    ports:
      # Host port:Container port — override with TOKENPAK_PORT env var
      - "${TOKENPAK_PORT:-8766}:8766"
    environment:
      # --- TokenPak Settings ---
      # Port the proxy listens on (must match EXPOSE in Dockerfile)
      TOKENPAK_PORT: "${TOKENPAK_PORT:-8766}"
      # Log verbosity: debug | info | warning | error
      TOKENPAK_LOG_LEVEL: "${TOKENPAK_LOG_LEVEL:-info}"
      # Enable Prometheus-compatible metrics endpoint (/metrics)
      TOKENPAK_METRICS_ENABLED: "${TOKENPAK_METRICS_ENABLED:-true}"
      TOKENPAK_CONFIG: "/home/tokenpak/.tokenpak/config.yaml"

      # --- Python Settings ---
      PYTHONUNBUFFERED: "1"

    volumes:
      # Config file (optional — uses defaults if not present)
      # Copy config/tokenpak.config.json.example → config/tokenpak.config.json and edit
      - ./config/config.yaml:/home/tokenpak/.tokenpak/config.yaml:ro

      # Persistent logs (survives container restarts)
      - tokenpak-logs:/app/logs

      # Persistent cache (optional, speeds up repeated requests)
      - tokenpak-cache:/app/cache

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8766/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    restart: unless-stopped

    # Resource limits (uncomment and adjust as needed)
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '1'
    #       memory: 512M
    #     reservations:
    #       cpus: '0.25'
    #       memory: 128M

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    networks:
      - tokenpak-network

  # --- Optional: Redis for distributed caching ---
  # Enable with: docker compose --profile with-cache up -d
  redis:
    image: redis:7-alpine
    container_name: tokenpak-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - tokenpak-network
    profiles:
      - "with-cache"

# Named volumes for persistent storage
volumes:
  tokenpak-logs:
    driver: local
  tokenpak-cache:
    driver: local
  redis-data:
    driver: local

# Internal network — services communicate by container name
networks:
  tokenpak-network:
    driver: bridge
