site_name: TokenPak
site_url: https://docs.tokenpak.ai/
repo_url: https://github.com/tokenpak/tokenpak
repo_name: tokenpak/tokenpak
site_author: TokenPak Contributors
docs_dir: docs
site_dir: site
theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  logo: assets/logo.svg
  favicon: assets/favicon.ico

nav:
  - Home: index.md
  - Getting Started:
    - Installation: installation.md
    - Quick Start: QUICKSTART.md
    - Comparison: comparison.md
    - Compatibility: COMPATIBILITY.md
    - Demo Data: demo.md
  - User Guide:
    - Configuration: configuration.md
    - Environment Variables: env-vars.md
    - CLI Reference: adapters.md
    - Error Handling: error-handling.md
    - Troubleshooting: troubleshooting.md
    - Docker Deployment: DOCKER.md
    - Savings: SAVINGS.md
    - Security: SECURITY.md
  - Architecture:
    - Overview: architecture.md
    - Component Diagram: COMPONENT-DIAGRAM.md
    - API Reference: API.md
    - API Reference (Extended): api-reference.md
    - Features: features.md
    - Plugin Guide: plugin-guide.md
    - Plugin System Architecture: plugin-system-architecture.md
    - OSS / PRO Boundary: OSS-PRO-BOUNDARY.md
    - Architecture Diagrams: assets/DIAGRAMS.md
  - Adapters:
    - OpenAI-Compatible: adapters/openai-compat.md
    - LiteLLM: adapters/litellm.md
    - LangChain: adapters/langchain.md
    - Google: adapters/google.md
  - Advanced:
    - Observability: observability.md
    - Production SLA: production-sla.md
    - Performance Overview: performance.md
    - Performance Benchmarks: PERFORMANCE.md
    - Compression Tuning: COMPRESSION_TUNING.md
    - Latency Analysis: LATENCY.md
    - Memory Analysis: performance/memory-analysis.md
    - Testing: TESTING.md
  - Recipes:
    - Multi-Provider Fallback: recipes/01-multi-provider-fallback.md
    - Budget Caps: recipes/02-budget-caps.md
    - Per-User Rate Limiting: recipes/03-per-user-rate-limiting.md
    - Model Routing by Use Case: recipes/04-model-routing-by-use-case.md
    - Cost Monitoring: recipes/05-cost-monitoring.md
    - Streaming Responses: recipes/06-streaming-responses.md
    - Local Development Mock: recipes/07-local-development-mock.md
  - Support:
    - FAQ: FAQ.md
    - Examples: EXAMPLES.md
    - Release Checklist: release-checklist.md

exclude_docs: |
  README.md
  INDEX.md
  TROUBLESHOOTING.md
  getting-started.md
  archive/**
  audits/**

plugins:
  - search:
      lang: en

markdown_extensions:
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      use_pygments: true
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
  - admonition
  - attr_list
  - md_in_html

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/tokenpak/tokenpak

copyright: Copyright &copy; 2026 TokenPak Contributors

watch:
  - docs
