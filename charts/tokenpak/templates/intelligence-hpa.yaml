{{- if and .Values.intelligence.enabled .Values.intelligence.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "tokenpak.fullname" . }}-intelligence
  labels:
    {{- include "tokenpak.labels" . | nindent 4 }}
    app.kubernetes.io/component: intelligence
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "tokenpak.fullname" . }}-intelligence
  minReplicas: {{ .Values.intelligence.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.intelligence.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.intelligence.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
