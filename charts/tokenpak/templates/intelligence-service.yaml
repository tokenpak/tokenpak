{{- if .Values.intelligence.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "tokenpak.fullname" . }}-intelligence
  labels:
    {{- include "tokenpak.labels" . | nindent 4 }}
    app.kubernetes.io/component: intelligence
spec:
  type: {{ .Values.intelligence.service.type }}
  ports:
    - port: {{ .Values.intelligence.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "tokenpak.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: intelligence
{{- end }}
