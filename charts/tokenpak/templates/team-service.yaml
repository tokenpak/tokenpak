{{- if .Values.team.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "tokenpak.fullname" . }}-team
  labels:
    {{- include "tokenpak.labels" . | nindent 4 }}
    app.kubernetes.io/component: team
spec:
  type: {{ .Values.team.service.type }}
  ports:
    - port: {{ .Values.team.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "tokenpak.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: team
{{- end }}
