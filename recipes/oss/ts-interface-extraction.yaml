name: ts-interface-extraction
category: javascript
description: Extract TypeScript interface and type definitions; drop implementation details.
pattern:
  match: extension
  extensions:
  - .ts
  - .tsx
  - .d.ts
action:
  operations:
  - type: ts_keep_interfaces_and_types
    keep_enums: true
    stub_class_bodies: true
  compression_hint: 0.6
