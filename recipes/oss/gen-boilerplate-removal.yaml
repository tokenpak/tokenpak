name: gen-boilerplate-removal
category: general
description: Strip common license headers, auto-generated file banners, and DO-NOT-EDIT warnings.
pattern:
  match: any
action:
  operations:
  - type: remove_block
    start_patterns:
    - ^\s*#\s*(Copyright|License|SPDX-License|DO NOT EDIT|AUTO-GENERATED)
    - ^\s*//\s*(Copyright|License|SPDX-License|DO NOT EDIT|AUTO-GENERATED)
    - ^\s*/\*\s*(Copyright|License|AUTO-GENERATED)
    end_pattern: ^\s*$
    max_lines: 30
  compression_hint: 0.15
