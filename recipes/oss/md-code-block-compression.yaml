name: md-code-block-compression
category: markdown
description: Truncate long code blocks (>50 lines) to first 20 lines + ellipsis.
pattern:
  match: extension
  extensions:
  - .md
  - .markdown
  - .mdx
action:
  operations:
  - type: md_truncate_code_blocks
    max_lines: 20
    ellipsis: '# ... (truncated)'
    min_block_lines: 50
  compression_hint: 0.25
