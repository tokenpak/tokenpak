name: py-import-dedup-sort
category: python
description: Remove duplicate import statements and sort them (stdlib → third-party → local).
pattern:
  match: extension
  extensions:
  - .py
action:
  operations:
  - type: python_import_dedup
  - type: python_import_sort
    order:
    - stdlib
    - third_party
    - local
  compression_hint: 0.05
