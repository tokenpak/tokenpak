name: cfg-cicd-compression
category: config
description: 'Compress GitHub Actions and GitLab CI configs: remove comments, collapse echo steps.'
pattern:
  match: path_pattern
  path_patterns:
  - \.github/workflows/.*\.ya?ml
  - \.gitlab-ci\.ya?ml
  - \.circleci/config\.ya?ml
action:
  operations:
  - type: yaml_strip_comments
  - type: yaml_collapse_run_blocks
    max_lines_per_run: 3
  - type: regex_replace
    pattern: \n{3,}
    replacement: '


      '
  compression_hint: 0.25
