name: js-css-in-js-extraction
category: javascript
description: Replace large CSS-in-JS style objects (styled-components, emotion) with a stub.
pattern:
  match: extension
  extensions:
  - .js
  - .jsx
  - .ts
  - .tsx
  keywords:
  - styled.
  - css`
  - makeStyles
action:
  operations:
  - type: regex_replace
    pattern: (styled\.\w+|css)`[^`]{150,}`
    replacement: \1`/* styles */`
    flags: dotall
  - type: regex_replace
    pattern: makeStyles\(\s*\([^)]*\)\s*=>\s*\{[^}]{200,}\}\s*\)
    replacement: makeStyles(() => ({ /* styles */ }))
    flags: dotall
  compression_hint: 0.3
