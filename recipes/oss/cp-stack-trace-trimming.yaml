name: cp-stack-trace-trimming
category: common_patterns
description: Keep only the top 5 frames of exception stack traces; remove redundant frame repetitions.
pattern:
  match: content
  keywords:
  - Traceback (most recent call last)
  - 'at '
  - '  File "'
action:
  operations:
  - type: truncate_stack_trace
    keep_frames: 5
    keep_error_line: true
  compression_hint: 0.5
