name: md-heading-hierarchy-normalization
category: markdown
description: Ensure heading levels are sequential (no skipping H2 → H4); normalize header depth.
pattern:
  match: extension
  extensions:
  - .md
  - .markdown
  - .mdx
action:
  operations:
  - type: md_normalize_heading_levels
  - type: regex_replace
    pattern: \n(#{1,6} .+)\n(?!\n)
    replacement: '

      \1


      '
  compression_hint: 0.02
