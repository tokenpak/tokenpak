name: js-jsx-component-signature
category: javascript
description: Keep React component signatures (props destructuring) and drop render bodies.
pattern:
  match: extension
  extensions:
  - .jsx
  - .tsx
action:
  operations:
  - type: js_stub_functions
    pattern: (export\s+)?(default\s+)?function\s+[A-Z]
    stub_body: '{ /* ... */ }'
  - type: js_stub_arrow_components
    stub_body: => null /* ... */
  compression_hint: 0.55
