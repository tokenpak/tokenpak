name: cfg-env-dedup
category: config
description: Remove duplicate keys from .env files, keeping the last definition.
pattern:
  match: filename
  filenames:
  - .env
  - .env.local
  - .env.example
  - .env.production
action:
  operations:
  - type: env_dedup_keys
    keep: last
  - type: remove_lines
    condition: comment_only
  compression_hint: 0.15
