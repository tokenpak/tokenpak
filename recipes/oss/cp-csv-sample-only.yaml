name: cp-csv-sample-only
category: common_patterns
description: Truncate CSV to header row + first 5 data rows.
pattern:
  match: extension
  extensions:
  - .csv
  - .tsv
action:
  operations:
  - type: csv_keep_head
    keep_header: true
    max_rows: 5
    ellipsis_row: '# ... ({total} rows total)'
  compression_hint: 0.9
