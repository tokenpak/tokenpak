name: cp-xml-attribute-pruning
category: common_patterns
description: Remove verbose/generated XML attributes (style, id, data-*, aria-*) from elements.
pattern:
  match: extension
  extensions:
  - .xml
  - .svg
  - .xsd
  - .wsdl
action:
  operations:
  - type: regex_replace
    pattern: \s+(style|data-[\w-]+|aria-[\w-]+)="[^"]*"
    replacement: ''
  - type: regex_replace
    pattern: \s+id="[0-9a-f\-]{8,}"
    replacement: ''
  compression_hint: 0.2
