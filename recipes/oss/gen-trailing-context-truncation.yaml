name: gen-trailing-context-truncation
category: general
description: Truncate trailing content after natural endings (e.g. after a final separator or conclusion marker).
pattern:
  match: any
action:
  operations:
  - type: truncate_after
    patterns:
    - ^---+\s*$
    - ^\*\*\*+\s*$
    - ^={3,}\s*$
    keep_marker: false
    max_trailing_lines: 5
  compression_hint: 0.1
