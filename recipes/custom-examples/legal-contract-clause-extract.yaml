name: legal-contract-clause-extract
category: legal
description: "Keep only numbered operative clauses; remove preamble and exhibits."
pattern:
  match: content
  keywords:
    - "AGREEMENT"
    - "Section"
    - "Article"
action:
  compression_hint: 0.40
  operations:
    - type: regex_replace
      pattern: "^(EXHIBIT|SCHEDULE|APPENDIX)[\\s\\S]*$"
      replacement: "[EXHIBITS OMITTED]"
      flags: ["MULTILINE"]
    - type: regex_replace
      pattern: "^\\s*PREAMBLE[\\s\\S]*?(?=\\n\\d+\\.)"
      replacement: ""
      flags: ["DOTALL"]
    - type: collapse_whitespace
    - type: remove_empty_lines
      max_consecutive: 1
