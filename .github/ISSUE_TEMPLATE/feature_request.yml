name: 🚀 Feature Request
description: Suggest a new feature or enhancement
title: "[FEATURE] "
labels: [enhancement]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping make TokenPak better! Please describe your idea clearly.
  - type: textarea
    id: problem
    attributes:
      label: Problem Description
      description: What problem are you trying to solve? What's missing or frustrating?
      placeholder: I often find myself needing to...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you tried any workarounds or alternative approaches?
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any mockups, examples, or related issues that help clarify the request.
