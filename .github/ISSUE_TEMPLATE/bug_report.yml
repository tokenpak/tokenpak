name: 🐛 Bug Report
description: Report something that isn't working correctly
title: "[BUG] "
labels: [bug]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in as much detail as possible.
  - type: textarea
    id: description
    attributes:
      label: Describe the Bug
      description: A clear and concise description of what the bug is.
      placeholder: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the bug.
      placeholder: |
        1. Install TokenPak via `pip install tokenpak`
        2. Run `tokenpak serve ...`
        3. ...
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include full error output if available.
    validations:
      required: true
  - type: input
    id: tokenpak-version
    attributes:
      label: TokenPak Version
      description: Run `tokenpak --version`
      placeholder: e.g., 1.2.0
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python Version
      description: Run `python --version`
      placeholder: e.g., 3.11.4
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: e.g., macOS 14, Ubuntu 22.04, Windows 11
    validations:
      required: true
  - type: input
    id: llm-client
    attributes:
      label: LLM Provider / Client
      placeholder: e.g., Claude Code, OpenAI SDK, LangChain
  - type: textarea
    id: logs
    attributes:
      label: Logs / Output
      description: Paste relevant logs or terminal output.
      render: shell
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or config snippets that might help.
