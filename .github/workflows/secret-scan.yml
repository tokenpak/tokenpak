name: Secret Scan

# Server-side secret scanning on every PR and push. This does not rely on the
# local pre-commit hook (which a contributor can skip with --no-verify), so a
# committed credential is caught even when the local guard is bypassed.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gitleaks:
    name: Scan for committed secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # full history so the commit range is resolvable

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: "8.18.4"
        run: |
          set -euo pipefail
          url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSfL "$url" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Resolve commit range
        id: range
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          fi
          # First push to a new branch reports an all-zero base; fall back to a
          # full scan in that case.
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            echo "log_opts=" >> "$GITHUB_OUTPUT"
          else
            echo "log_opts=${base}..${head}" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect secrets
        run: |
          set -euo pipefail
          # New secrets in the pushed / PR commits fail the job. Scoping to the
          # incoming range avoids re-flagging pre-existing test fixtures while
          # still blocking any newly introduced credential.
          if [ -n "${{ steps.range.outputs.log_opts }}" ]; then
            gitleaks detect \
              --source . \
              --log-opts="${{ steps.range.outputs.log_opts }}" \
              --redact --no-banner --exit-code 1 \
              --report-format sarif --report-path gitleaks-report.sarif
          else
            gitleaks detect \
              --source . \
              --redact --no-banner --exit-code 1 \
              --report-format sarif --report-path gitleaks-report.sarif
          fi

      - name: Upload scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.sarif
          if-no-files-found: ignore
