name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint (ruff + black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint tools
        run: pip install ruff black

      - name: Run ruff
        run: ruff check tokenpak/

      - name: Check black formatting
        run: black --check tokenpak/ --line-length 100

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: pytest tests/ -q --tb=short --cov=tokenpak --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.12'
        with:
          file: coverage.xml
          fail_ci_if_error: false

      - name: Smoke test CLI
        run: |
          python -m tokenpak.cli --help
          python -c "from tokenpak.routing.rules import RoutePattern, RouteRule, RouteEngine; print('routing OK')"
          python -c "from tokenpak.agent.license.keys import LicensePayload; print('license OK')"

  adoption-killers:
    name: Adoption Killers (Latency · Determinism · Transparency · Stack · Adoption)
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run adoption killers test suite
        run: |
          pytest tests/test_adoption_killers.py -v --tb=short \
            -k "not test_p50" \
            2>&1 | tee adoption_killers_report.txt
          echo "--- ADOPTION KILLERS RESULT ---"
          grep -E "PASSED|FAILED|ERROR|adoption_killers" adoption_killers_report.txt | tail -20

      - name: Enforce p95 latency gate (< 50ms)
        run: |
          pytest tests/test_adoption_killers.py::TestLatencyRequirement::test_p95_compile_under_50ms \
            -v --tb=long
          echo "✅ p95 latency gate passed"

      - name: Enforce determinism gate (100 compiles)
        run: |
          pytest tests/test_adoption_killers.py::TestDeterminismRequirement \
            -v --tb=long
          echo "✅ Determinism gate passed"

      - name: Upload benchmark report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: adoption-killers-report
          path: adoption_killers_report.txt

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: [lint, test, adoption-killers]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        run: python -m build

      - name: Check dist with twine
        run: twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    permissions:
      id-token: write  # Trusted Publisher (OIDC)
    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
