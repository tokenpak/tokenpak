name: CI — Lint & Test

on:
  push:
    branches: [main, develop]
    paths:
      - 'tokenpak/**'
      - 'tests/**'
      - '.github/workflows/ci.yml'
      - 'pyproject.toml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'tokenpak/**'
      - 'tests/**'
      - 'pyproject.toml'
  workflow_dispatch:

# Note: CLI-docs + doc-audit jobs were removed in the 2026-04-19
# standards-relocation. User-facing docs now live in the sibling
# tokenpak/docs repo; that repo owns its own doc-consistency CI.

jobs:
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Lint with Ruff
        # Uses pyproject.toml's [tool.ruff.lint] + per-file-ignores;
        # no explicit --select/--ignore flags so the config is the
        # single source of truth (flags would override per-file-ignores).
        run: ruff check tokenpak/ tests/

  # P2-14: Architecture import contracts enforced in CI.
  # Runs lint-imports against .importlinter. Every §5.2 exception has
  # an explicit allowlist entry; this job catches drift that would let
  # layering / entrypoint-forbidden / MCP-plumbing / contracts-single-
  # home rules silently break. Blocking on main + release + PRs.
  import-contracts:
    name: Import contracts (Architecture §2 + §1.4)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install tokenpak + import-linter
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: lint-imports
        run: lint-imports --config .importlinter

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: |
          python -m pytest tests/ -v --tb=short \
            -m "not integration and not chaos and not slow" \
            --junitxml=reports/test-results-py${{ matrix.python-version }}.xml \
            --cov=tokenpak \
            --cov-report=xml \
            --cov-report=term-missing

      # Phase 2 coverage (Tier-1 modules) + Tier-1 coverage gate (≥50%) + overall
      # coverage gate (≥45%) steps were removed in the 2026-04-19
      # standards-relocation: they ran `pytest tests/test_validation*.py
      # tests/test_error*.py tests/test_cache*.py` against file globs that no
      # longer match any file on github/main. Post-rewrite the test suite has a
      # different structure; Tier-1 coverage gates will be reintroduced in 1.1.0
      # once architecture-aligned test files are written.

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-py${{ matrix.python-version }}
          path: reports/test-results-py${{ matrix.python-version }}.xml
          retention-days: 30

  # PM/GTM v2 C4: cli-docs-in-sync. Process-enforced blocking gate
  # (standard 21 §9.8). Runs the generator in --check mode; fails the
  # PR if docs/reference/cli.md drifts from the argparse truth in
  # tokenpak/cli/_impl.py. Refresh locally with:
  #
  #     python3 scripts/generate-cli-docs.py
  #
  # then commit the updated file.
  #
  # Required status-check name reviewers must treat as blocking:
  #
  #   - cli-docs-in-sync (blocking)
  cli-docs-in-sync:
    name: cli-docs-in-sync (blocking)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Check CLI reference is up to date
        run: |
          python3 scripts/generate-cli-docs.py --check

  # PM/GTM v2 A5: pin README headline compression claim as a dedicated
  # blocking gate per standard 21 §9.8 (process-enforced). The benchmark also
  # runs inside the `test:` job above — this dedicated job gives reviewers an
  # unambiguous status-check name they can hold a PR on.
  #
  # Required status-check name reviewers must treat as blocking before merging
  # a change that could affect compression effectiveness:
  #
  #   - headline-benchmark (blocking)
  #
  # Process-enforced per 21 §9.8; no GitHub platform-level gate.
  headline-benchmark:
    name: headline-benchmark (blocking)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Reproduce README headline claim
        run: |
          make benchmark-headline
