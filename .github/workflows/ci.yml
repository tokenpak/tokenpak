name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          pytest tests/ -q --tb=short

      - name: Smoke test CLI
        run: |
          python -m tokenpak.cli --help
          python -c "from tokenpak.routing.rules import RoutePattern, RouteRule, RouteEngine; print('routing OK')"
          python -c "from tokenpak.agent.license.keys import LicensePayload; print('license OK')"
