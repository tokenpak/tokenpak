name: Identity & language check

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  identity-language:
    name: No internal identity / workflow language in changed files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute changed files
        id: changed
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          # Only files added or modified in this PR; binary files skipped.
          git diff --name-only --diff-filter=AM "$base" "$head" \
            | grep -vE "^(packages/tests/|tests/|sdk/dist/|\.github/workflows/identity-language-check\.yml|\.github/workflows/public-layout-check\.yml|\.pre-commit-config\.yaml)" \
            | grep -E '\.(md|py|yml|yaml|json|toml|sh|js|ts|tsx)$' \
            > changed-files.txt || true
          echo "Changed files (filtered):"
          cat changed-files.txt | sed 's/^/  /'

      - name: Scan for forbidden identity / language
        run: |
          set -euo pipefail
          if [ ! -s changed-files.txt ]; then
            echo "No relevant files changed; skipping."
            exit 0
          fi

          # Patterns that must NEVER appear in newly added or modified
          # public-surface text. Existing legacy occurrences in
          # untouched files are tolerated as historical debt.
          # Notes on word-boundary choice:
          #   - \bSue\b matches the agent name but NOT product names
          #     like "SuePak" (none currently).
          #   - "claude" without a hyphen would match user-facing
          #     "Claude Code" / "Claude API" — those are legitimate.
          #     We do NOT pattern-match bare "claude" here.
          #   - \bfleet\b is the one pattern whose internal sense
          #     ("agent fleet", "fleet worker", "fleet workflow",
          #     "fleet orchestration") collides with legitimate public
          #     CLI surface (`tokenpak fleet`, `--fleet`,
          #     `fleet.yaml`, "fleet-wide", "multi-instance fleet").
          #     The legitimate public surfaces are masked before the
          #     fleet grep via content_for_pattern() below; the rule
          #     still catches every internal-execution use.
          patterns=(
            '\bSue\b'
            '\bCali\b'
            '\bTrix\b'
            '\bSuki\b'
            '\bAya\b'
            '\bDee\b'
            '\bReiPo\b'
            '\bopenclaw\b'
            '\bfleet\b'
            'TSR-[0-9]'
            'TPS-[0-9]'
            'CCI-[0-9]'
            'MTC-[0-9]'
            'OAS-[0-9]'
            'TIP7-[0-9]'
            'TRIX-MTC'
            'WS-[0-9]'
            '\.claude/projects'
            '/home/sue/'
            'trixxie168'
            '\bStd 2[0-9]\b'
            '\bStd 3[0-9]\b'
            'Suki: auto-commit'
          )

          # Mask known-public uses of "fleet" before the fleet grep.
          # All other patterns see the file content unchanged.
          # Allowlist (public CLI/config/product-capability surface):
          #   tokenpak fleet               -> CLI verb
          #   --fleet                      -> CLI flag
          #   fleet.yaml                   -> config file
          #   fleet config(uration)        -> public capability prose
          #   fleet command                -> public capability prose
          #   fleet management             -> public capability prose
          #   fleet-wide                   -> public help/doc idiom
          #   multi-instance fleet         -> public tmux deployment mode
          #   multi-instance-fleet         -> anchor-name form of above
          # Internal-execution senses ("agent fleet", "bot fleet",
          # "internal fleet", "fleet worker", "fleet workflow",
          # "fleet orchestration", "Sue/Suki/Cali/Trix fleet") are
          # NOT masked and remain forbidden.
          # Narrow standards-implementation allowlist (Kevin standing-override
          # 2026-05-16): release-gate implementation/test/workflow surfaces
          # legitimately reference Std 21 (Branching & Merge Policy) and
          # Std 30 (Release-Gate Trust Contract) — those standards are
          # WHAT THE CODE IS IMPLEMENTING. Without this exception the broad
          # \bStd 2[0-9]\b / \bStd 3[0-9]\b patterns would forbid Std 30
          # implementation code from referencing Std 30 by number.
          #
          # TWO-TIER SCOPE (intentionally narrow):
          #
          #   Tier 1 — release-gate implementation surfaces (human-authored):
          #     - scripts/release_gate/**
          #     - .github/workflows/release.yml
          #     - .github/workflows/release-rehearsal.yml
          #     - Makefile (release-gate targets)
          #     Masks: Std 21 + Std 30 references only.
          #
          #   Tier 2 — release-gate generated-artifact surfaces:
          #     - tokenpak/_snapshots/**
          #     Masks: Std 21 + Std 30 references AND `openclaw` module
          #     symbols (existing package modules like
          #     `tokenpak.creds.providers.openclaw`, `tokenpak.sdk.openclaw`
          #     are real generated symbol names captured in public-api.json;
          #     forcing them to be renamed via the language check would
          #     break the package).
          #
          # ONLY Std 21 and Std 30 are masked. Other Std numbers (22, 23,
          # 31, 32, etc.) remain forbidden in these files. Outside Tier 1+2
          # paths the standards patterns apply unchanged.
          #
          # This is a standards-implementation + generated-artifact exception,
          # NOT a general public-language exemption: agent names, internal
          # fleet names, internal task IDs, /home/sue/ paths,
          # .claude/projects paths, etc. all remain forbidden everywhere
          # except where they are LITERAL GENERATED PACKAGE MODULE NAMES
          # (which is the openclaw narrow case under Tier 2 only).
          is_release_gate_impl_path() {
            case "$1" in
              scripts/release_gate/*|.github/workflows/release.yml|.github/workflows/release-rehearsal.yml|Makefile)
                return 0 ;;
              *) return 1 ;;
            esac
          }

          is_release_gate_snapshot_path() {
            case "$1" in
              tokenpak/_snapshots/*) return 0 ;;
              *) return 1 ;;
            esac
          }

          content_for_pattern() {
            local pat="$1" file="$2"
            # Order matters here. Tier 2 snapshot files get checked FIRST
            # because their masks must apply uniformly regardless of which
            # pattern is being scanned for (the older form gated only on
            # $pat='\bfleet\b' and never reached Tier 2 for fleet patterns,
            # so tokenpak.cli.fleet leaked through even though Tier 2
            # intends to allow it).
            if is_release_gate_snapshot_path "$file"; then
              # Tier 2 — generated-artifact scope. Apply ALL legitimate
              # snapshot-scope masks unconditionally so the grep for each
              # forbidden pattern sees a host-/symbol-cleaned file.
              #
              # Masks (snapshot-scope only):
              #   - Std 21 / Std 30 governance references (legitimate
              #     R7/R11 metadata about snapshot purpose)
              #   - `fleet` (every occurrence reflects real public surface:
              #     `tokenpak.cli.fleet` module path, `fleet` as a CLI
              #     symbol name, etc.)
              #   - `openclaw` (every occurrence reflects real generated
              #     module names such as
              #     `tokenpak.creds.providers.openclaw`,
              #     `tokenpak.sdk.openclaw`, or bare provider-name strings)
              #
              # Other patterns (agent names Sue/Cali/Trix/Suki/Aya/Dee/ReiPo,
              # internal task IDs, /home/sue/ paths, .claude/projects,
              # other Std numbers, "Suki: auto-commit", etc.) remain
              # enforced even in snapshot files.
              sed -E \
                -e 's/\bStd 21\b/Std __PUBLIC_RELGATE_REF_21__/g' \
                -e 's/\bStd 30\b/Std __PUBLIC_RELGATE_REF_30__/g' \
                -e 's/\bopenclaw\b/__GENERATED_SYMBOL_OPENCLAW__/g' \
                -e 's/\bfleet\b/__GENERATED_SYMBOL_FLEET__/g' \
                "$file"
            elif [ "$pat" = '\bfleet\b' ]; then
              sed -E \
                -e 's/tokenpak[[:space:]]+fleet/tokenpak __PUBLIC_FLEET_VERB__/g' \
                -e 's/--fleet([^a-zA-Z]|$)/--__PUBLIC_FLEET_FLAG__\1/g' \
                -e 's/fleet\.yaml/__PUBLIC_FLEET_CONFIG__.yaml/g' \
                -e 's/fleet[[:space:]]+(config|configuration|command|management)/__PUBLIC_FLEET_PHRASE__ \1/g' \
                -e 's/fleet-wide/__PUBLIC_FLEET_PHRASE__-wide/g' \
                -e 's/multi-instance[[:space:]]+fleet/multi-instance __PUBLIC_TMUX_MODE__/g' \
                -e 's/multi-instance-fleet/multi-instance-__PUBLIC_TMUX_MODE__/g' \
                "$file"
            elif is_release_gate_impl_path "$file"; then
              # Tier 1 — release-gate implementation/test/workflow surface:
              # mask the specific Std 21 / Std 30 references the code
              # legitimately implements. All other patterns (agent names,
              # internal IDs, paths, etc.) and all other Std numbers remain
              # enforced. openclaw is NOT masked here — Tier 1 files should
              # not reference openclaw.
              sed -E \
                -e 's/\bStd 21\b/Std __PUBLIC_RELGATE_REF_21__/g' \
                -e 's/\bStd 30\b/Std __PUBLIC_RELGATE_REF_30__/g' \
                "$file"
            else
              cat "$file"
            fi
          }

          fail=0
          while IFS= read -r f; do
            [ -f "$f" ] || continue
            for p in "${patterns[@]}"; do
              if grep -nE "$p" <(content_for_pattern "$p" "$f") 2>/dev/null; then
                # Print with file:line:match for clickable error annotation
                while IFS= read -r line; do
                  ln=$(echo "$line" | cut -d: -f1)
                  echo "::error file=$f,line=$ln::Forbidden pattern '$p' in changed file."
                done < <(grep -nE "$p" <(content_for_pattern "$p" "$f"))
                fail=1
              fi
            done
          done < changed-files.txt

          if [ "$fail" -ne 0 ]; then
            echo
            echo "One or more changed files contain forbidden identity / workflow language."
            echo "See CONTRIBUTING.md → Public language rules."
            exit 1
          fi
          echo "Identity / language check OK."
