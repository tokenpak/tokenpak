name: Identity & language check

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  identity-language:
    name: No internal identity / workflow language in changed files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute changed files
        id: changed
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          # Only files added or modified in this PR; binary files skipped.
          # scripts/release_gate/check_release_leaks.py is excluded for the same
          # reason this workflow and public-layout-check.yml are: it is the
          # full-tree sibling scanner and intentionally contains the
          # forbidden-pattern register + path-scoped allowlist literals.
          git diff --name-only --diff-filter=AM "$base" "$head" \
            | grep -vE "^(packages/tests/|tests/|sdk/dist/|scripts/release_gate/check_release_leaks\.py|\.github/workflows/identity-language-check\.yml|\.github/workflows/public-layout-check\.yml|\.pre-commit-config\.yaml)" \
            | grep -E '\.(md|py|yml|yaml|json|toml|sh|js|ts|tsx)$' \
            > changed-files.txt || true
          echo "Changed files (filtered):"
          cat changed-files.txt | sed 's/^/  /'

      - name: Scan for forbidden identity / language
        run: |
          set -euo pipefail
          if [ ! -s changed-files.txt ]; then
            echo "No relevant files changed; skipping."
            exit 0
          fi

          # Patterns that must NEVER appear in newly added or modified
          # public-surface text. Existing legacy occurrences in
          # untouched files are tolerated as historical debt.
          # Notes on word-boundary choice:
          #   - \bSue\b matches the agent name but NOT product names
          #     like "SuePak" (none currently).
          #   - "claude" without a hyphen would match user-facing
          #     "Claude Code" / "Claude API" — those are legitimate.
          #     We do NOT pattern-match bare "claude" here.
          #   - \bfleet\b is the one pattern whose internal sense
          #     ("agent fleet", "fleet worker", "fleet workflow",
          #     "fleet orchestration") collides with legitimate public
          #     CLI surface (`tokenpak fleet`, `--fleet`,
          #     `fleet.yaml`, "fleet-wide", "multi-instance fleet").
          #     The legitimate public surfaces are masked before the
          #     fleet grep via content_for_pattern() below; the rule
          #     still catches every internal-execution use.
          patterns=(
            '\bSue\b'
            '\bCali\b'
            '\bTrix\b'
            '\bSuki\b'
            '\bAya\b'
            '\bDee\b'
            '\bReiPo\b'
            '\bopenclaw\b'
            '\bfleet\b'
            'TSR-[0-9]'
            'TPS-[0-9]'
            'CCI-[0-9]'
            'MTC-[0-9]'
            'OAS-[0-9]'
            'TIP7-[0-9]'
            'TRIX-MTC'
            'WS-[0-9]'
            'CCG-[0-9]'
            'CCP-[0-9]'
            'VDS-[0-9]'
            'FIN-[0-9]'
            'TSG-[0-9]'
            'TIP-[0-9][0-9]'
            '\.claude/projects'
            '/home/sue/'
            'trixxie168'
            '\bStd 2[0-9]\b'
            '\bStd 3[0-9]\b'
            'Suki: auto-commit'
          )

          # Mask known-public uses of "fleet" before the fleet grep.
          # All other patterns see the file content unchanged.
          # Allowlist (public CLI/config/product-capability surface):
          #   tokenpak fleet               -> CLI verb
          #   --fleet                      -> CLI flag
          #   fleet.yaml                   -> config file
          #   fleet config(uration)        -> public capability prose
          #   fleet command                -> public capability prose
          #   fleet management             -> public capability prose
          #   fleet-wide                   -> public help/doc idiom
          #   multi-instance fleet         -> public tmux deployment mode
          #   multi-instance-fleet         -> anchor-name form of above
          # Internal-execution senses ("agent fleet", "bot fleet",
          # "internal fleet", "fleet worker", "fleet workflow",
          # "fleet orchestration", "Sue/Suki/Cali/Trix fleet") are
          # NOT masked and remain forbidden.
          # Narrow standards-implementation allowlist (Kevin standing-override
          # 2026-05-16): release-gate implementation/test/workflow surfaces
          # legitimately reference Std 21 (Branching & Merge Policy) and
          # Std 30 (Release-Gate Trust Contract) — those standards are
          # WHAT THE CODE IS IMPLEMENTING. Without this exception the broad
          # \bStd 2[0-9]\b / \bStd 3[0-9]\b patterns would forbid Std 30
          # implementation code from referencing Std 30 by number.
          #
          # TWO-TIER SCOPE (intentionally narrow):
          #
          #   Tier 1 — release-gate implementation surfaces (human-authored):
          #     - scripts/release_gate/**
          #     - .github/workflows/release.yml
          #     - .github/workflows/release-rehearsal.yml
          #     - Makefile (release-gate targets)
          #     Masks: Std 21 + Std 30 references only.
          #
          #   Tier 2 — release-gate generated-artifact surfaces:
          #     - tokenpak/_snapshots/**
          #     Masks: Std 21 + Std 30 references AND `openclaw` module
          #     symbols (existing package modules like
          #     `tokenpak.creds.providers.openclaw`, `tokenpak.sdk.openclaw`
          #     are real generated symbol names captured in public-api.json;
          #     forcing them to be renamed via the language check would
          #     break the package).
          #
          # ONLY Std 21 and Std 30 are masked. Other Std numbers (22, 23,
          # 31, 32, etc.) remain forbidden in these files. Outside Tier 1+2
          # paths the standards patterns apply unchanged.
          #
          # This is a standards-implementation + generated-artifact exception,
          # NOT a general public-language exemption: agent names, internal
          # fleet names, internal task IDs, /home/sue/ paths,
          # .claude/projects paths, etc. all remain forbidden everywhere
          # except where they are LITERAL GENERATED PACKAGE MODULE NAMES
          # (which is the openclaw narrow case under Tier 2 only).
          is_release_gate_impl_path() {
            case "$1" in
              scripts/release_gate/*|.github/workflows/release.yml|.github/workflows/release-rehearsal.yml|Makefile)
                return 0 ;;
              *) return 1 ;;
            esac
          }

          is_release_gate_snapshot_path() {
            case "$1" in
              tokenpak/_snapshots/*) return 0 ;;
              *) return 1 ;;
            esac
          }

          # Path-scoped allowlist for the OpenClaw provider/SDK/integration
          # subsystem. `openclaw` is a real, public, non-renamable provider
          # name: the integration ships under integrations/openclaw/**, and the
          # SDK + creds + routing modules that implement/wire that provider
          # reference it directly. In these specific files every `openclaw`
          # occurrence is the legitimate provider/module name, so the
          # \bopenclaw\b rule is fully masked HERE ONLY. This is path-scoped,
          # NOT a global openclaw exemption — any other file referencing bare
          # `openclaw` is still caught (and only the functional-literal masks
          # below apply there).
          is_openclaw_public_path() {
            case "$1" in
              tokenpak/integrations/openclaw/*) return 0 ;;
              tokenpak/sdk/openclaw.py|tokenpak/sdk/registry.py|tokenpak/sdk/__init__.py) return 0 ;;
              tokenpak/creds/providers/openclaw.py|tokenpak/creds/providers/__init__.py) return 0 ;;
              tokenpak/creds/router.py|tokenpak/creds/doctor.py) return 0 ;;
              tokenpak/services/routing_service/*|tokenpak/proxy/route_policy.py) return 0 ;;
              tokenpak/tests/test_sdk_openclaw.py) return 0 ;;
              *) return 1 ;;
            esac
          }

          # Path-scoped allowlist for the public `tokenpak fleet` / `dashboard
          # --fleet` feature and its functional spend-guard fleet surface. In
          # these specific feature files `fleet` is the user-facing
          # multi-instance-proxy capability (machines the USER runs), not
          # internal agent/governor language. The \bfleet\b rule is fully
          # masked HERE ONLY. Internal-execution "fleet" (agent/governor/bot
          # fleet) in any OTHER file remains forbidden (caught by the narrow
          # masks below).
          is_fleet_public_path() {
            case "$1" in
              tokenpak/cli/fleet.py|tokenpak/cli/commands/dashboard.py) return 0 ;;
              tokenpak/tests/test_fleet.py|scripts/install-completions.sh) return 0 ;;
              tokenpak/proxy/spend_guard/rolling_caps.py) return 0 ;;
              tokenpak/integrations/openclaw/*) return 0 ;;
              *) return 1 ;;
            esac
          }

          # OpenClaw is a first-class PUBLIC TokenPak integration surface:
          # `tokenpak openclaw` is a real public CLI subcommand, `openclaw`
          # is a real provider id, and the package ships an importable SDK
          # module, a creds provider, and an agent adapter for it. On those
          # integration source paths the lowercase token legitimately appears
          # as non-renamable functional surface:
          #   - config-discovery directories (`~/.openclaw/`,
          #     `~/.openclaw-governor/`, the `.openclaw*` discovery glob)
          #   - the `openclaw:<...>` secret-ref scheme prefix
          #   - the `openclaw-<...>` credential-id prefix
          #   - "openclaw-shaped" data-shape prose
          # These are WHAT THE CODE INTEGRATES WITH and cannot be renamed
          # without breaking the integration. This classifier scopes the
          # extra openclaw masks (below) to those paths ONLY, mirroring how
          # `fleet` masking is scoped to the public fleet feature surface.
          # A bare `openclaw` on a NON-integration path is still caught,
          # because the extra masks are applied only here.
          #
          # Scope note: this covers the importable integration MODULES (the
          # CLI surface + SDK + creds provider + agent adapter + their unit
          # tests) — the files a cross-cutting change typically touches. The
          # installable hook bundle under tokenpak/integrations/openclaw/** is
          # intentionally NOT included: those files carry their own, separate
          # public-language debt (e.g. internal task-id references) that a
          # dedicated cleanup must address; folding them in here would either
          # leave them failing anyway or require a far broader openclaw mask.
          is_openclaw_integration_path() {
            case "$1" in
              tokenpak/_cli_core.py) return 0 ;;
              tokenpak/sdk/openclaw*.py) return 0 ;;
              tokenpak/creds/providers/openclaw*.py) return 0 ;;
              tokenpak/agent/adapters/openclaw*.py) return 0 ;;
              tokenpak/tests/test_sdk_openclaw.py|tokenpak/tests/test_creds_openclaw.py) return 0 ;;
              *) return 1 ;;
            esac
          }

          # The installable OpenClaw hook bundle under
          # tokenpak/integrations/openclaw/** IS the public OpenClaw adapter
          # shipped to users. On those paths every lowercase `openclaw` token
          # is functional/product surface that must remain verbatim: the
          # integration path itself, the `openclaw-adapter` hook directory,
          # the `openclaw-gateway` systemd unit, the `~/.openclaw/...`
          # config-discovery dirs, the `User-Agent: openclaw*` match, the
          # external `openclaw hooks` / `openclaw doctor` CLI verbs, and the
          # openclaw.ai / openclaw.md documentation references. The extra
          # masks below are SCOPED to this exact hook surface (mirroring
          # is_openclaw_integration_path for the importable module surface)
          # and mask ONLY those functional openclaw forms. OAS-/agent/
          # /home/sue//Std/fleet patterns are NOT masked here and remain
          # enforced; a bare `openclaw` on any path OUTSIDE this hook bundle
          # is still caught.
          is_openclaw_integration_hook_path() {
            case "$1" in
              tokenpak/integrations/openclaw/*) return 0 ;;
              *) return 1 ;;
            esac
          }

          content_for_pattern() {
            local pat="$1" file="$2"
            # Order matters here. Tier 2 snapshot files get checked FIRST
            # because their masks must apply uniformly regardless of which
            # pattern is being scanned for (the older form gated only on
            # $pat='\bfleet\b' and never reached Tier 2 for fleet patterns,
            # so tokenpak.cli.fleet leaked through even though Tier 2
            # intends to allow it).
            if is_release_gate_snapshot_path "$file"; then
              # Tier 2 — generated-artifact scope. Apply ALL legitimate
              # snapshot-scope masks unconditionally so the grep for each
              # forbidden pattern sees a host-/symbol-cleaned file.
              #
              # Masks (snapshot-scope only):
              #   - Std 21 / Std 30 governance references (legitimate
              #     R7/R11 metadata about snapshot purpose)
              #   - `fleet` (every occurrence reflects real public surface:
              #     `tokenpak.cli.fleet` module path, `fleet` as a CLI
              #     symbol name, etc.)
              #   - `openclaw` (every occurrence reflects real generated
              #     module names such as
              #     `tokenpak.creds.providers.openclaw`,
              #     `tokenpak.sdk.openclaw`, or bare provider-name strings)
              #
              # Other patterns (agent names Sue/Cali/Trix/Suki/Aya/Dee/ReiPo,
              # internal task IDs, /home/sue/ paths, .claude/projects,
              # other Std numbers, "Suki: auto-commit", etc.) remain
              # enforced even in snapshot files.
              sed -E \
                -e 's/\bStd 21\b/Std __PUBLIC_RELGATE_REF_21__/g' \
                -e 's/\bStd 30\b/Std __PUBLIC_RELGATE_REF_30__/g' \
                -e 's/\bopenclaw\b/__GENERATED_SYMBOL_OPENCLAW__/g' \
                -e 's/\bfleet\b/__GENERATED_SYMBOL_FLEET__/g' \
                "$file"
            elif [ "$pat" = '\bfleet\b' ] && is_fleet_public_path "$file"; then
              # Path-scoped allowlist (see is_fleet_public_path): the public
              # fleet/dashboard feature + functional spend-guard fleet surface.
              # Every `fleet` here is the user-facing multi-instance capability,
              # so mask the whole word in these files only.
              sed -E -e 's/\bfleet\b/__PUBLIC_FLEET_FEATURE__/g' "$file"
            elif [ "$pat" = '\bfleet\b' ]; then
              # Mask ONLY the public `tokenpak fleet` feature surface (the
              # multi-machine proxy fleet CLI/config command and its docs):
              # the CLI verb/flag/config file, the `fleet` subcommand literal
              # and argument references, and the feature's own docstrings.
              # Internal-execution senses ("agent fleet", "fleet worker",
              # "fleet runtime", "fleet governor", "fleet agents", "bot fleet")
              # are deliberately NOT masked and remain forbidden.
              #
              # Functional spend-guard fleet surface (analogous to the openclaw
              # functional-symbol mask below): the spend guard scopes rolling
              # caps across a multi-instance fleet via the `x-tokenpak-fleet`
              # request header and per-fleet / fleet-level capability prose.
              # These are non-renamable API/protocol identifiers plus the public
              # multi-instance-fleet capability — NOT internal-execution
              # language — so those specific functional forms are masked; the
              # internal senses listed above remain forbidden.
              sed -E \
                -e 's/tokenpak[[:space:]]+fleet/tokenpak __PUBLIC_FLEET_VERB__/g' \
                -e 's/--fleet([^a-zA-Z]|$)/--__PUBLIC_FLEET_FLAG__\1/g' \
                -e 's/fleet\.yaml/__PUBLIC_FLEET_CONFIG__.yaml/g' \
                -e 's/fleet[[:space:]]+(config|configuration|command|management|rollup|status)/__PUBLIC_FLEET_PHRASE__ \1/g' \
                -e 's/fleet-telemetry/__PUBLIC_FLEET_PHRASE__-telemetry/g' \
                -e 's/fleet-wide/__PUBLIC_FLEET_PHRASE__-wide/g' \
                -e 's/multi-instance[[:space:]]+fleet/multi-instance __PUBLIC_TMUX_MODE__/g' \
                -e 's/multi-instance-fleet/multi-instance-__PUBLIC_TMUX_MODE__/g' \
                -e 's/"fleet"/"__PUBLIC_FLEET_LITERAL__"/g' \
                -e 's/fleet=/__PUBLIC_FLEET_KW__=/g' \
                -e 's/if fleet:/if __PUBLIC_FLEET_PARAM__:/g' \
                -e 's/fleet: bool/__PUBLIC_FLEET_PARAM__: bool/g' \
                -e 's/a fleet of/a __PUBLIC_FLEET_PHRASE__ of/g' \
                -e 's/proxy fleet/proxy __PUBLIC_FLEET_PHRASE__/g' \
                -e 's/fleet manifest/__PUBLIC_FLEET_PHRASE__ manifest/g' \
                -e 's/fleet automation/__PUBLIC_FLEET_PHRASE__ automation/g' \
                -e 's/Current fleet/Current __PUBLIC_FLEET_PHRASE__/g' \
                -e 's/fleet init/__PUBLIC_FLEET_PHRASE__ init/g' \
                -e 's/agents in fleet/agents in __PUBLIC_FLEET_PHRASE__/g' \
                -e 's/configured in fleet/configured in __PUBLIC_FLEET_PHRASE__/g' \
                -e 's/cli\.fleet/cli.__PUBLIC_FLEET_MODULE__/g' \
                -e 's/configure fleet/configure __PUBLIC_FLEET_PHRASE__/g' \
                -e 's/=fleet\b/=__PUBLIC_FLEET_KW__/g' \
                -e 's/x-tokenpak-fleet/x-tokenpak-__FUNCTIONAL_FLEET_HDR__/g' \
                -e 's/per-fleet/per-__FUNCTIONAL_FLEET_SCOPE__/g' \
                -e 's/fleet-level/__FUNCTIONAL_FLEET_SCOPE__-level/g' \
                -e 's/fleet([- ])protection/__FUNCTIONAL_FLEET_SCOPE__\1protection/g' \
                -e 's/fleet caps/__FUNCTIONAL_FLEET_SCOPE__ caps/g' \
                -e 's#session ?/ ?fleet ?/ ?agent#session/__FUNCTIONAL_FLEET_SCOPE__/agent#g' \
                "$file"
            elif is_release_gate_impl_path "$file"; then
              # Tier 1 — release-gate implementation/test/workflow surface:
              # mask the specific Std 21 / Std 30 references the code
              # legitimately implements. All other patterns (agent names,
              # internal IDs, paths, etc.) and all other Std numbers remain
              # enforced. openclaw is NOT masked here — Tier 1 files should
              # not reference openclaw.
              sed -E \
                -e 's/\bStd 21\b/Std __PUBLIC_RELGATE_REF_21__/g' \
                -e 's/\bStd 30\b/Std __PUBLIC_RELGATE_REF_30__/g' \
                "$file"
            elif [ "$pat" = '\bopenclaw\b' ] && is_openclaw_public_path "$file"; then
              # Path-scoped allowlist (see is_openclaw_public_path): the
              # OpenClaw provider/SDK/integration subsystem — `openclaw` is the
              # legitimate public provider/module name in these files, so mask
              # the whole word here only.
              sed -E -e 's/\bopenclaw\b/__INTEGRATION_OPENCLAW__/g' "$file"
            elif [ "$pat" = '\bopenclaw\b' ]; then
              # Functional-symbol mask (exact literals only). A few OpenClaw
              # references are real, non-renamable API/wire/CLI symbols: the SDK
              # module import paths, the x-openclaw-* request headers, the
              # `openclaw` CLI subcommand literal, the `openclaw:main` caller
              # form, and the `openclaw.json` config filename. These exact
              # strings are masked everywhere (any changed file) so editing a
              # file that contains them does not trip the \bopenclaw\b rule.
              #
              # On the public OpenClaw INTEGRATION module paths (the CLI
              # surface, SDK module, creds provider, agent adapter, and their
              # unit tests — see is_openclaw_integration_path) a few MORE forms
              # are legitimate,
              # non-renamable functional surface and are additionally masked:
              #   - config-discovery dirs: `~/.openclaw/`,
              #     `~/.openclaw-governor/`, and the `.openclaw*` glob
              #   - the `openclaw:<...>` secret-ref scheme prefix
              #   - the `openclaw-<...>` credential-id prefix
              #   - "openclaw-shaped" data-shape prose
              # These extra masks are SCOPED to integration paths only.
              #
              # Public-facing identity/workflow language stays forbidden. This
              # is NOT a blanket "openclaw allowed" exemption: outside the
              # integration paths only the exact module/header/CLI literals are
              # masked, so any other bare "openclaw" (prose, comments, new
              # identifiers) in a non-integration changed file is still caught.
              # Even on integration paths, ONLY the functional forms above are
              # masked — other forbidden patterns (agent names like Suki, Sue,
              # Cali; internal IDs; /home/sue/ paths; .claude/projects; Std
              # numbers) are checked through their own (unmasked) content and
              # remain enforced there too. Human-facing prose uses the
              # CamelCase "OpenClaw" brand, which the lowercase \bopenclaw\b
              # rule does not match and which needs no mask.
              masked=$(sed -E \
                -e 's/tokenpak\.sdk\.openclaw/tokenpak.sdk.__FUNC_OPENCLAW_MODULE__/g' \
                -e 's/tokenpak\.creds\.providers\.openclaw/tokenpak.creds.providers.__FUNC_OPENCLAW_MODULE__/g' \
                -e 's/x-openclaw-session/x-__FUNC_OPENCLAW_HEADER__-session/g' \
                -e 's/x-openclaw-workspace/x-__FUNC_OPENCLAW_HEADER__-workspace/g' \
                -e 's/"openclaw"/"__FUNC_OPENCLAW_LITERAL__"/g' \
                -e 's/openclaw:main/__FUNC_OPENCLAW_CALLER__:main/g' \
                -e 's/openclaw\.json/__FUNC_OPENCLAW_CONFIG__.json/g' \
                "$file")
              if is_openclaw_integration_path "$file"; then
                # Order matters: mask the more-specific `.openclaw-governor`
                # before the generic `.openclaw` / `.openclaw*` forms.
                printf '%s\n' "$masked" | sed -E \
                  -e 's/\.openclaw-governor/.__OCINT_GOVERNOR_DIR__/g' \
                  -e 's/\.openclaw\*/.__OCINT_CONFIG_DIR__*/g' \
                  -e 's/\.openclaw\b/.__OCINT_CONFIG_DIR__/g' \
                  -e 's/openclaw-shaped/__OCINT_SHAPE_PROSE__-shaped/g' \
                  -e 's/openclaw-\{/__OCINT_ID_PREFIX__-{/g' \
                  -e 's/openclaw:/__OCINT_SECRETREF_SCHEME__:/g'
              elif is_openclaw_integration_hook_path "$file"; then
                # Installable OpenClaw hook bundle. Mask ONLY the functional
                # openclaw product/runtime/config identifiers shipped in the
                # adapter. Order: specific compounds first, then the path
                # component, then dir/domain/doc/UA/CLI forms. Nothing else
                # (OAS-/agent/path/Std/fleet) is masked here, so a real leak
                # in these files is still caught.
                printf '%s\n' "$masked" | sed -E \
                  -e 's/openclaw-adapter/__OCHOOK_ADAPTER__/g' \
                  -e 's/openclaw-gateway/__OCHOOK_GATEWAY__/g' \
                  -e 's#integrations/openclaw#integrations/__OCHOOK_PATH__#g' \
                  -e 's/\.openclaw-governor/.__OCHOOK_GOVERNOR_DIR__/g' \
                  -e 's/\.openclaw\b/.__OCHOOK_CONFIG_DIR__/g' \
                  -e 's/openclaw\.ai/__OCHOOK_DOMAIN__.ai/g' \
                  -e 's/openclaw\.md/__OCHOOK_DOC__.md/g' \
                  -e 's/openclaw\*/__OCHOOK_UA__*/g' \
                  -e 's/openclaw (hooks|doctor)/__OCHOOK_CLI__ \1/g'
              else
                printf '%s\n' "$masked"
              fi
            elif [ "$pat" = '\.claude/projects' ]; then
              # The Claude Code transcript source adapter legitimately reads the
              # user's local Claude Code transcript directory
              # (~/.claude/projects/<project-slug>/<session>.jsonl). That exact
              # external-tool path is functional public surface and must stay
              # visible to users in docs/code. Mask ONLY that literal path so it
              # does not trip the \.claude/projects rule. Any other
              # .claude/projects reference is still caught.
              sed -E \
                -e 's#~/\.claude/projects#~/__FUNC_CLAUDE_TRANSCRIPT_DIR__#g' \
                "$file"
            else
              cat "$file"
            fi
          }

          fail=0
          while IFS= read -r f; do
            [ -f "$f" ] || continue
            for p in "${patterns[@]}"; do
              if grep -nE "$p" <(content_for_pattern "$p" "$f") 2>/dev/null; then
                # Print with file:line:match for clickable error annotation
                while IFS= read -r line; do
                  ln=$(echo "$line" | cut -d: -f1)
                  echo "::error file=$f,line=$ln::Forbidden pattern '$p' in changed file."
                done < <(grep -nE "$p" <(content_for_pattern "$p" "$f"))
                fail=1
              fi
            done
          done < changed-files.txt

          if [ "$fail" -ne 0 ]; then
            echo
            echo "One or more changed files contain forbidden identity / workflow language."
            echo "See CONTRIBUTING.md → Public language rules."
            exit 1
          fi
          echo "Identity / language check OK."
