# release-rehearsal.yml — weekly dry-run of the full release pipeline.
#
# Std 30 §8 (R8) + §13.4 (R19). Triggered on Mondays 09:00 UTC by ReiPo
# Phase 0.5 sub-sweep (or manually via workflow_dispatch). Runs every gate
# in the production release pipeline EXCEPT PyPI publish.
#
# Hard guard: the publish step contains `if: github.ref != 'refs/tags/rehearsal-*'`
# so a misfire never publishes. The throwaway tag MUST start with `rehearsal-`.
#
# Authority: Std 30 §8, ratified 2026-05-09.

name: Release Rehearsal

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Throwaway tag (must start with rehearsal-)'
        required: true
        default: 'rehearsal-AUTO'
  schedule:
    # Mondays 09:13 UTC (off-clock minute per scheduler best-practice)
    - cron: '13 9 * * 1'

permissions:
  contents: read
  actions: read

jobs:
  preflight:
    name: Preflight — guard tag prefix
    runs-on: ubuntu-latest
    outputs:
      rehearsal_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Compute rehearsal tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            TAG="rehearsal-$(date -u +%Y-%m-%d-%H%M)"
          else
            TAG="${{ github.event.inputs.tag }}"
            if [[ "$TAG" == "rehearsal-AUTO" ]]; then
              TAG="rehearsal-$(date -u +%Y-%m-%d-%H%M)"
            fi
          fi
          if [[ ! "$TAG" =~ ^rehearsal- ]]; then
            echo "::error::Tag $TAG does not start with 'rehearsal-' — refusing"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Rehearsal tag: $TAG"

  install-shape-matrix:
    name: Install-shape matrix (slim/dev/full)
    needs: preflight
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shape: [slim, dev, full]
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (shape=${{ matrix.shape }})
        run: |
          python -m pip install --upgrade pip
          case "${{ matrix.shape }}" in
            slim) pip install . ;;
            dev)  pip install ".[dev]" ;;
            full) pip install ".[dev,retrieval,code-compression,intelligence,data,compression]" ;;
          esac

      - name: Pytest with --continue-on-collection-errors (Std 30 §4 R4)
        id: pytest
        run: |
          case "${{ matrix.shape }}" in
            slim) MARKERS="oss" ;;
            dev)  MARKERS="oss or optional" ;;
            full) MARKERS="oss or optional or internal" ;;
          esac
          set +e
          pytest tests/ \
            -m "$MARKERS" \
            --continue-on-collection-errors \
            --tb=short -q \
            2>&1 | tee pytest-output.log
          PYTEST_RC=$?
          set -e
          # Count collection errors per Std 30 §4
          COLLECT_ERRORS=$(grep -c "^ERROR collecting" pytest-output.log || true)
          echo "collection_errors=$COLLECT_ERRORS" >> "$GITHUB_OUTPUT"
          echo "pytest_rc=$PYTEST_RC" >> "$GITHUB_OUTPUT"
          echo "Collection errors: $COLLECT_ERRORS  Pytest RC: $PYTEST_RC"

      - name: Gate on collection errors (Std 30 §4)
        if: steps.pytest.outputs.collection_errors != '0'
        run: |
          echo "::error::Collection errors detected (count=${{ steps.pytest.outputs.collection_errors }}). See Std 30 §4."
          exit 1

      - name: Gate on test failures
        if: steps.pytest.outputs.pytest_rc != '0' && steps.pytest.outputs.collection_errors == '0'
        run: |
          echo "::error::pytest exited ${{ steps.pytest.outputs.pytest_rc }} with no collection errors — runtime failures."
          exit 1

  release-gate-snapshots:
    name: Release-gate snapshot validation
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install (dev shape)
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"
      - name: api-snapshot-check (Std 30 §7 R7)
        run: make api-snapshot-check
      - name: workflow-steps-check (Std 30 §13.3 R11)
        run: make workflow-steps-check
      - name: telemetry-check (Std 30 §7 R7)
        run: make telemetry-check
      - name: taxonomy-check (Std 30 §5 R5)
        run: make taxonomy-check

  build-artifacts:
    name: Build sdist + wheel + sdist purity (R9)
    needs: [install-shape-matrix, release-gate-snapshots]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install build
        run: pip install --upgrade pip build
      - name: Build sdist + wheel
        run: python -m build
      - name: Sdist / wheel purity (Std 30 §13.1 R9)
        run: |
          # Inclusion-direction guard: shipped artifacts MUST NOT contain _internal/ paths.
          if unzip -l dist/*.whl | grep -E '_internal/|tests/_internal/'; then
            echo "::error::wheel contains _internal/ paths — Std 30 §13.1 violation"
            exit 1
          fi
          if tar -tzf dist/*.tar.gz | grep -E '_internal/|tests/_internal/'; then
            echo "::error::sdist contains _internal/ paths — Std 30 §13.1 violation"
            exit 1
          fi
          echo "✅  sdist + wheel purity: no _internal/ paths"
      - name: Upload artifacts (rehearsal — never published)
        uses: actions/upload-artifact@v4
        with:
          name: rehearsal-dist-${{ needs.preflight.outputs.rehearsal_tag }}
          path: dist/

  publish-blocked:
    # Hard guard per Std 30 §8: this step proves the publish branch would NOT
    # fire on a rehearsal tag. The actual condition (`if: github.ref !=
    # 'refs/tags/rehearsal-*'`) lives on the production release.yml publish
    # step; here we explicitly fail if anyone tries to publish a rehearsal tag.
    name: Publish guard (rehearsal MUST NOT publish)
    needs: build-artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Refuse to publish rehearsal tag
        run: |
          echo "Rehearsal tag '${{ needs.preflight.outputs.rehearsal_tag }}' — publish step intentionally absent."
          echo "Per Std 30 §8: rehearsal workflow MUST NOT reach PyPI."
