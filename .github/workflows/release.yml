name: Release TokenPak

# =============================================================================
# CANONICAL release + publish workflow (F-01 consolidation, 2026-04-22).
#
# This file is the single source of truth for:
#   - running the pre-release test gate
#   - building wheel + sdist + SHA256SUMS
#   - creating the GitHub Release
#   - publishing to PyPI (non-prerelease tags only)
#
# The former `publish.yml` was deleted as part of F-01 because both
# workflows fired on the same `push: tags: v*` trigger, producing
# duplicate build + publish attempts per tag. One tag now drives one
# publish path.
#
# Third-party actions are pinned to commit SHAs (ported from the
# deleted publish.yml). softprops/action-gh-release is pinned to its
# floating major tag because it was already release.yml-native at
# the time of consolidation.
# =============================================================================

on:
  push:
    tags:
      - 'v*'
  # Preflight / dry-run trigger (added 2026-04-22 after v1.3.3 and v1.3.4
  # burned on smoke-step + tempdir-race bugs that only surfaced at tag-push
  # time). Firing the workflow via `gh workflow run release.yml --ref <sha>`
  # runs the test + build jobs against a candidate commit; the release +
  # publish jobs are skipped via their `if: github.event_name == 'push'`
  # guards so no tag is cut and no PyPI upload is attempted. Use this to
  # verify release-gate health before tagging.
  workflow_dispatch:

permissions:
  contents: write  # Required for creating releases

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Step 0: Validate that every SHA-pinned `uses:` resolves to the
  # expected published tag. Catches the class of bug that burned v1.3.3
  # through v1.3.5 (bad actions/download-artifact + pypa/gh-action-pypi-
  # publish SHAs only discovered at tag-push time, after the
  # workflow_dispatch preflight had already passed test + build).
  #
  # Runs on both push:tags AND workflow_dispatch so the preflight fully
  # covers the release path, not just test + build.
  # ─────────────────────────────────────────────────────────────────────
  validate-pins:
    name: Validate SHA pins
    runs-on: ubuntu-latest
    steps:
      - name: Resolve upstream tag SHAs and assert matches
        run: |
          set -euo pipefail
          # Map: "<org>/<repo> <tag>" → expected-commit-SHA.
          # Keep this list in sync with every SHA-pinned uses: in this
          # workflow. softprops/action-gh-release is pinned to the
          # floating @v2 tag and is not listed here.
          declare -A PINS=(
            ["actions/checkout v4.2.2"]="11bd71901bbe5b1630ceea73d27597364c9af683"
            ["actions/setup-python v5.3.0"]="0b93645e9fea7318ecaed2b359559ac225c90a2b"
            ["actions/upload-artifact v4.6.0"]="65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08"
            ["actions/download-artifact v4.1.8"]="fa0a91b85d4f404e444e00e005971372dc801d16"
            ["pypa/gh-action-pypi-publish v1.12.3"]="67339c736fd9354cd4f8cb0b744f2b82a74b5c70"
          )
          FAIL=0
          for key in "${!PINS[@]}"; do
            repo="${key% *}"
            tag="${key#* }"
            expected="${PINS[$key]}"
            # Try peeled (annotated tag) first, then plain (lightweight tag).
            actual=$(git ls-remote --tags "https://github.com/${repo}.git" "refs/tags/${tag}^{}" 2>/dev/null | cut -f1 || true)
            if [ -z "$actual" ]; then
              actual=$(git ls-remote --tags "https://github.com/${repo}.git" "refs/tags/${tag}" 2>/dev/null | cut -f1 || true)
            fi
            if [ -z "$actual" ]; then
              echo "::error::${repo}@${tag}: tag not found upstream"
              FAIL=1
            elif [ "$actual" != "$expected" ]; then
              echo "::error::${repo}@${tag}: expected ${expected}, got ${actual}"
              FAIL=1
            else
              echo "OK: ${repo}@${tag} = ${expected}"
            fi
          done
          exit $FAIL

  # ─────────────────────────────────────────────────────────────────────
  # Step 1: Run tests to ensure tag is release-worthy
  # ─────────────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: validate-pins
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python 3.12
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        # Release-gate scope: release-worthiness only. TIP-1.0 conformance
        # is gated by .github/workflows/tip-self-conformance.yml (canonical
        # gate per DECISION-SC-08-1); duplicating it here would require a
        # registry checkout + TOKENPAK_REGISTRY_ROOT wiring this workflow
        # intentionally does not carry.
        run: pytest tests/ -q --tb=short --ignore=tests/conformance

      - name: Smoke test CLI
        # Use the installed console-script entry point (tokenpak.cli:main
        # via pyproject.toml [project.scripts]). `python -m tokenpak.cli`
        # does not work because tokenpak/cli is a package without a
        # __main__.py — exercising the entry point is closer to what end
        # users actually run.
        run: tokenpak --help

  # ─────────────────────────────────────────────────────────────────────
  # Step 2: Build distribution artifacts
  # ─────────────────────────────────────────────────────────────────────
  build:
    name: Build Distribution
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python 3.12
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build wheel and sdist
        run: python -m build

      - name: Verify package
        run: twine check dist/*

      - name: Generate checksums
        # SHA256SUMS is attached to the GitHub Release for user-side
        # integrity verification, but it is NOT a Python distribution —
        # twine rejects it as InvalidDistribution. Generate it in a
        # sibling ``checksums/`` directory so ``dist/`` contains only
        # wheel + sdist. Publish job pulls only ``dist``; release job
        # pulls both artifacts and attaches all three to the GH Release.
        run: |
          mkdir -p checksums
          cd dist
          sha256sum * > ../checksums/SHA256SUMS
          cat ../checksums/SHA256SUMS

      - name: Upload dist artifacts (wheel + sdist only, no checksums)
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        with:
          name: dist
          path: dist/

      - name: Upload checksums artifact
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        with:
          name: checksums
          path: checksums/

  # ─────────────────────────────────────────────────────────────────────
  # Step 3: Create GitHub Release with artifacts
  # ─────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    # Skip GH Release creation on workflow_dispatch (preflight / dry-run);
    # only real tag pushes should cut a GitHub Release.
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Download dist artifacts (wheel + sdist)
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16  # v4.1.8
        with:
          name: dist
          path: dist/

      - name: Download checksums
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16  # v4.1.8
        with:
          name: checksums
          path: checksums/

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: notes
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}

          # Try to extract section from CHANGELOG.md
          if [ -f CHANGELOG.md ]; then
            # Extract the section for this version
            NOTES=$(awk "/## \[$VERSION\]|## $VERSION/{flag=1; next} /## \[|## [0-9]/{flag=0} flag" CHANGELOG.md)
          fi

          # Fallback if no changelog entry
          if [ -z "$NOTES" ]; then
            NOTES="Release v$VERSION

          ## Installation

          \`\`\`bash
          pip install tokenpak==$VERSION
          \`\`\`

          ## What's New

          See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.

          ## Checksums

          \`\`\`
          $(cat checksums/SHA256SUMS)
          \`\`\`
          "
          fi

          # Write to file for the release action
          echo "$NOTES" > RELEASE_NOTES.md
          cat RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3  # floating major tag — release.yml-native pre-F-01
        with:
          name: TokenPak v${{ steps.version.outputs.VERSION }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ contains(github.ref, 'rc') || contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
          files: |
            dist/*.whl
            dist/*.tar.gz
            checksums/SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────
  # Step 4: Publish to PyPI (non-prerelease tags only, Trusted Publisher)
  # ─────────────────────────────────────────────────────────────────────
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: release
    # Publish only on real tag pushes (not workflow_dispatch preflight)
    # AND only on non-prerelease tags (no rc/alpha/beta).
    if: ${{ github.event_name == 'push' && !contains(github.ref, 'rc') && !contains(github.ref, 'alpha') && !contains(github.ref, 'beta') }}
    environment: pypi
    permissions:
      id-token: write  # Required for Trusted Publisher (OIDC)
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16  # v4.1.8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@67339c736fd9354cd4f8cb0b744f2b82a74b5c70  # v1.12.3
