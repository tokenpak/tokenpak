name: Release TokenPak

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # Required for creating releases

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Step 1: Run tests to ensure tag is release-worthy
  # ─────────────────────────────────────────────────────────────────────
  #
  # Test-gate contract (TIP7-001 + 2026-05-08 follow-up):
  #
  # This job installs only the [dev] extra — pytest, ruff, black, etc. — and
  # NOT [full] / [retrieval] / [intelligence] etc. That's intentional: the
  # auto-publish gate must pass on a slim install so users following the
  # documented "pip install tokenpak" path get the same suite that ships.
  #
  # Test files that depend on optional/external/internal modules MUST guard
  # their imports at module load time so collection succeeds without the
  # extra installed:
  #
  #   • Optional deps (numpy, fastapi, scipy, pandas, llmlingua, litellm) →
  #     `pytest.importorskip("dep_name", reason="...")` after `import pytest`.
  #
  #   • External packages bundled in extras (sentence-transformers, etc.) →
  #     same `pytest.importorskip` call.
  #
  #   • Symbols missing from a namespace package that DOES exist in slim OSS
  #     (e.g. `from tokenpak.compaction import CompactionMode` where
  #     `tokenpak.compaction/` is a namespace dir but the submodule isn't
  #     bundled) → wrap the import in
  #     `try: ... except ImportError as exc: pytest.skip(..., allow_module_level=True)`.
  #     `importorskip` on the bare namespace returns truthy and won't help here.
  #
  #   • Python-version-dependent stdlib modules (e.g. `tomllib` is stdlib only
  #     on 3.11+; absent on 3.10) → same `pytest.importorskip("tomllib", ...)`
  #     pattern. The test runs on the matrix versions where the stdlib module
  #     is available; coverage stays adequate via the supported-version matrix.
  #
  # When this gate is red, do NOT bypass it via `--ignore=...`. Either fix
  # the failing test's import guard or add the missing extra to this step.
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -q --tb=short

      - name: Smoke test CLI
        run: python -m tokenpak.cli --help

  # ─────────────────────────────────────────────────────────────────────
  # Step 2: Build distribution artifacts
  # ─────────────────────────────────────────────────────────────────────
  build:
    name: Build Distribution
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build wheel and sdist
        run: python -m build

      - name: Verify package
        run: twine check dist/*

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ─────────────────────────────────────────────────────────────────────
  # Step 3: Create GitHub Release with artifacts
  # ─────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: notes
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          
          # Try to extract section from CHANGELOG.md
          if [ -f CHANGELOG.md ]; then
            # Extract the section for this version
            NOTES=$(awk "/## \[$VERSION\]|## $VERSION/{flag=1; next} /## \[|## [0-9]/{flag=0} flag" CHANGELOG.md)
          fi
          
          # Fallback if no changelog entry
          if [ -z "$NOTES" ]; then
            NOTES="Release v$VERSION

          ## Installation

          \`\`\`bash
          pip install tokenpak==$VERSION
          \`\`\`

          ## What's New

          See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.

          ## Checksums

          \`\`\`
          $(cat dist/SHA256SUMS)
          \`\`\`
          "
          fi
          
          # Write to file for the release action
          echo "$NOTES" > RELEASE_NOTES.md
          cat RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: TokenPak v${{ steps.version.outputs.VERSION }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ contains(github.ref, 'rc') || contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────
  # Step 4: Publish to PyPI (optional, requires OIDC setup)
  # ─────────────────────────────────────────────────────────────────────
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: release
    # Only publish on non-prerelease tags (no rc/alpha/beta)
    if: ${{ !contains(github.ref, 'rc') && !contains(github.ref, 'alpha') && !contains(github.ref, 'beta') }}
    environment: pypi
    permissions:
      id-token: write  # Required for Trusted Publisher (OIDC)
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
