name: Release TokenPak

on:
  push:
    tags:
      - 'v*'
  # Manual-dispatch entry point for pre-tag preflight runs against any branch
  # (typically `main` immediately before pushing a tag). The dispatch uses the
  # same test → build → dist-purity assert → checksum job graph as a real tag
  # push; only the publish-to-PyPI job is skipped (see the publish job's `if:`).
  # Use:
  #   gh workflow run "Release TokenPak" --ref main
  # Then verify the run is green before `git push <tag>`.
  workflow_dispatch:

permissions:
  contents: write  # Required for creating releases

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Step 1: Run tests to ensure tag is release-worthy
  # ─────────────────────────────────────────────────────────────────────
  #
  # Test-gate contract:
  #
  # This job installs only the [dev] extra — pytest, ruff, black, etc. — and
  # NOT [full] / [retrieval] / [intelligence] etc. That's intentional: the
  # auto-publish gate must pass on a slim install so users following the
  # documented "pip install tokenpak" path get the same suite that ships.
  #
  # Test files that depend on optional/external/internal modules MUST guard
  # their imports at module load time so collection succeeds without the
  # extra installed:
  #
  #   • Optional deps (numpy, fastapi, scipy, pandas, llmlingua, litellm) →
  #     `pytest.importorskip("dep_name", reason="...")` after `import pytest`.
  #
  #   • External packages bundled in extras (sentence-transformers, etc.) →
  #     same `pytest.importorskip` call.
  #
  #   • Symbols missing from a namespace package that DOES exist in slim OSS
  #     (e.g. `from tokenpak.compaction import CompactionMode` where
  #     `tokenpak.compaction/` is a namespace dir but the submodule isn't
  #     bundled) → wrap the import in
  #     `try: ... except ImportError as exc: pytest.skip(..., allow_module_level=True)`.
  #     `importorskip` on the bare namespace returns truthy and won't help here.
  #
  #   • Python-version-dependent stdlib modules (e.g. `tomllib` is stdlib only
  #     on 3.11+; absent on 3.10) → same `pytest.importorskip("tomllib", ...)`
  #     pattern. The test runs on the matrix versions where the stdlib module
  #     is available; coverage stays adequate via the supported-version matrix.
  #
  # When this gate is red, do NOT bypass it via `--ignore=...`. Either fix
  # the failing test's import guard or add the missing extra to this step.
  test:
    # Std 30 §3 (R3) install-shape parity: matrix runs slim/dev/full so the
    # release gate validates what each install shape actually ships.
    # Std 30 §4 (R4) collection-error visibility: --continue-on-collection-errors +
    # discrete collection_errors output.
    # Std 30 §5 (R5) test taxonomy markers: -m selection per shape per Std 30 §3.
    name: Run Tests (shape=${{ matrix.shape }} py=${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shape: [slim, dev, full]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (shape=${{ matrix.shape }})
        run: |
          python -m pip install --upgrade pip
          case "${{ matrix.shape }}" in
            slim) pip install -e . ;;
            dev)  pip install -e ".[dev]" ;;
            full) pip install -e ".[dev,retrieval,code-compression,intelligence,data,compression]" ;;
          esac

      - name: Run tests with collection-error visibility
        id: pytest
        run: |
          case "${{ matrix.shape }}" in
            slim) MARKERS="oss" ;;
            dev)  MARKERS="oss or optional" ;;
            full) MARKERS="oss or optional or internal" ;;
          esac
          set +e
          pytest tests/ \
            -m "$MARKERS" \
            --continue-on-collection-errors \
            -q --tb=short \
            2>&1 | tee pytest-output.log
          PYTEST_RC=$?
          set -e
          COLLECT_ERRORS=$(grep -c "^ERROR collecting" pytest-output.log || true)
          echo "collection_errors=$COLLECT_ERRORS" >> "$GITHUB_OUTPUT"
          echo "pytest_rc=$PYTEST_RC" >> "$GITHUB_OUTPUT"

      - name: Gate on collection errors (Std 30 §4)
        if: steps.pytest.outputs.collection_errors != '0'
        run: |
          echo "::error::Collection errors detected (count=${{ steps.pytest.outputs.collection_errors }}). See Std 30 §4 — collection errors are a distinct, non-mergeable error class."
          exit 1

      - name: Gate on test failures
        if: steps.pytest.outputs.pytest_rc != '0' && steps.pytest.outputs.collection_errors == '0'
        run: |
          echo "::error::pytest exited ${{ steps.pytest.outputs.pytest_rc }} with no collection errors — runtime failures."
          exit 1

      - name: Smoke test CLI
        if: matrix.shape == 'dev' && matrix.python-version == '3.12'
        run: python -m tokenpak.cli --help

  release-gate-snapshots:
    # Std 30 §7 + §13.3 (R7 + R11): snapshot checks before any build/release.
    name: Release-gate snapshot validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (dev shape)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: api-snapshot-check (Std 30 §7 R7)
        run: make api-snapshot-check
      - name: workflow-steps-check (Std 30 §13.3 R11)
        run: make workflow-steps-check
      - name: telemetry-check (Std 30 §7 R7)
        run: make telemetry-check
      - name: taxonomy-check (Std 30 §5 R5)
        run: make taxonomy-check

  # ─────────────────────────────────────────────────────────────────────
  # Step 2: Build distribution artifacts
  # ─────────────────────────────────────────────────────────────────────
  #
  # Dist-purity contract (2026-05-09 cleanup):
  #
  # The `dist/` directory uploaded as the `dist` artifact MUST contain only
  # valid Python distribution files: `*.whl` and `*.tar.gz`. Nothing else.
  #
  # `pypa/gh-action-pypi-publish` enumerates `dist/*` and uploads each entry
  # to PyPI. Any non-distribution file (e.g. SHA256SUMS, RELEASE_NOTES.md)
  # is rejected with `InvalidDistribution: Unknown distribution format` and
  # the entire publish fails. This was the v1.5.3 failure mode and the same
  # defect documented in `feedback_release_path_hardening` ("SHA256SUMS
  # outside dist/").
  #
  # Therefore:
  #   • SHA256SUMS is generated at the repo root (./SHA256SUMS), NEVER inside dist/.
  #   • Checksums are uploaded as a separate `checksums` artifact.
  #   • The `release` job downloads both `dist` and `checksums` to attach
  #     everything to the GitHub Release.
  #   • The `publish` job downloads ONLY the `dist` artifact and runs a
  #     pre-publish guard that fails if `dist/` contains anything other than
  #     `*.whl` or `*.tar.gz`.
  #
  # If you add a new release artifact, give it its own artifact name; do
  # NOT drop it into `dist/`.
  build:
    name: Build Distribution
    runs-on: ubuntu-latest
    needs: [test, release-gate-snapshots]
    steps:
      - uses: actions/checkout@v4

      # ───────────────────────────────────────────────────────────────
      # Release-gate hardening: action pin enforcement.
      #
      # Verifies that every `uses: <owner>/<repo>@<ref>` reference in
      # .github/workflows/*.yml is either a full 40-char commit SHA or
      # a non-hex floating ref (version tag, branch, slashed ref).
      # Abbreviated SHA pins (7–39 hex chars) are rejected — see the
      # script header for the rationale.
      #
      # Runs unconditionally on every release-workflow invocation
      # (tag push or workflow_dispatch preflight) so an abbreviated-SHA
      # pin that slips through PR review still fails before any build,
      # release artifact, or PyPI publish.
      # ───────────────────────────────────────────────────────────────
      - name: Check action pins (peeled-commit or floating-tag only)
        run: bash scripts/check-action-pins.sh

      # ───────────────────────────────────────────────────────────────
      # Release-gate hardening: tag-source validation.
      #
      # Public release tags MUST sit on a commit reachable from
      # origin/main. The documented promotion path is:
      #
      #     workbench → staging PR → public PR → public main → tag
      #
      # A tag pushed against a feature branch (never merged) would
      # otherwise auto-publish to PyPI without the public-PR gate.
      # This step fails fast on that pattern.
      #
      # Skipped on `workflow_dispatch` preflight runs (no tag ref) and
      # on non-`v*` tag pushes (e.g. release-rehearsal `rehearsal-*`
      # tags, which are explicitly out of `on.push.tags` anyway but
      # the guard is doubly safe).
      # ───────────────────────────────────────────────────────────────
      - name: Validate tag source (public-main ancestry)
        if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
        run: |
          set -euo pipefail
          git fetch origin main --depth=200
          if ! git merge-base --is-ancestor "${{ github.sha }}" origin/main; then
            echo "::error::Tag ${{ github.ref }} (sha ${{ github.sha }}) is not reachable from origin/main." >&2
            echo "::error::Public release tags MUST be on commits already merged to main via the documented promotion path." >&2
            echo "::error::Required path: workbench → staging → public → tag/publish (see CONTRIBUTING.md)." >&2
            exit 1
          fi
          echo "::notice::Tag ${{ github.ref }} verified on origin/main."

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build wheel and sdist
        run: python -m build

      - name: Verify package
        run: twine check dist/*

      - name: Assert dist/ purity (only .whl + .tar.gz)
        run: |
          set -euo pipefail
          shopt -s nullglob
          extras=()
          for f in dist/*; do
            base="$(basename "$f")"
            case "$base" in
              *.whl|*.tar.gz) ;;
              *) extras+=("$base") ;;
            esac
          done
          if [ "${#extras[@]}" -gt 0 ]; then
            echo "ERROR: dist/ contains non-distribution files: ${extras[*]}" >&2
            echo "       PyPI publish would fail. See dist-purity contract above." >&2
            exit 1
          fi
          echo "dist/ purity check OK:"
          ls -la dist/

      - name: Assert sdist / wheel content purity (Std 30 §13.1 R9)
        # Inclusion-direction guard: shipped artifacts MUST NOT contain
        # _internal/ paths. Catches the failure mode that R6/R7 don't
        # (those catch *removal* of public surfaces; this catches
        # *inclusion* of private surfaces in the OSS distribution).
        run: |
          set -euo pipefail
          if unzip -l dist/*.whl | grep -E '_internal/|tests/_internal/'; then
            echo "::error::wheel contains _internal/ paths — Std 30 §13.1 violation"
            exit 1
          fi
          if tar -tzf dist/*.tar.gz | grep -E '_internal/|tests/_internal/'; then
            echo "::error::sdist contains _internal/ paths — Std 30 §13.1 violation"
            exit 1
          fi
          echo "✅  sdist + wheel content purity: no _internal/ paths"

      - name: Generate checksums (outside dist/)
        run: |
          # SHA256SUMS lives at repo root, NEVER inside dist/.
          # See dist-purity contract on the build job.
          ( cd dist && sha256sum *.whl *.tar.gz ) > SHA256SUMS
          cat SHA256SUMS

      # ───────────────────────────────────────────────────────────────
      # Release-gate hardening: dist-purity ratchet on the checksum
      # path. SHA256SUMS MUST live at repo root, never inside dist/.
      # This is the exact v1.5.3 regression pattern (checksum file
      # ended up in dist/, PyPI publish rejected the directory).
      #
      # The build-job `Assert dist/ purity` step already covers the
      # general case (only .whl / .tar.gz in dist/); this step is a
      # narrower, named guard against the specific SHA256SUMS-in-dist
      # failure mode so the regression — if it ever recurs — produces
      # a diagnostic message that names the failure rather than a
      # generic "non-distribution files" line.
      # ───────────────────────────────────────────────────────────────
      - name: Assert SHA256SUMS outside dist/
        run: |
          set -euo pipefail
          if [ -f dist/SHA256SUMS ]; then
            echo "::error::SHA256SUMS detected inside dist/ — this is the v1.5.3 regression pattern." >&2
            echo "       Checksum file MUST live at repo root, not inside dist/." >&2
            ls -la dist/ >&2
            exit 1
          fi
          if [ ! -f SHA256SUMS ]; then
            echo "::error::SHA256SUMS missing from repo root after checksum generation." >&2
            exit 1
          fi
          echo "::notice::SHA256SUMS is at repo root (outside dist/); dist-purity preserved on the checksum path."

      - name: Upload dist artifact (wheels + sdist only)
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Upload checksums artifact (SHA256SUMS only)
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: SHA256SUMS

  # ─────────────────────────────────────────────────────────────────────
  # Step 3: Create GitHub Release with artifacts
  # ─────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    # Only create the GitHub Release on real tag pushes. Manual dispatch runs
    # (workflow_dispatch) are preflight only — they exercise test → build →
    # dist-purity assert → checksum but MUST NOT cut a GitHub Release.
    if: ${{ github.event_name == 'push' }}
    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Download checksums artifact
        uses: actions/download-artifact@v4
        with:
          name: checksums
          path: .

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: notes
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}

          # Try to extract section from CHANGELOG.md
          if [ -f CHANGELOG.md ]; then
            # Extract the section for this version
            NOTES=$(awk "/## \[$VERSION\]|## $VERSION/{flag=1; next} /## \[|## [0-9]/{flag=0} flag" CHANGELOG.md)
          fi

          # Fallback if no changelog entry
          if [ -z "$NOTES" ]; then
            NOTES="Release v$VERSION

          ## Installation

          \`\`\`bash
          pip install tokenpak==$VERSION
          \`\`\`

          ## What's New

          See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.

          ## Checksums

          \`\`\`
          $(cat SHA256SUMS)
          \`\`\`
          "
          fi

          # Write to file for the release action
          echo "$NOTES" > RELEASE_NOTES.md
          cat RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: TokenPak v${{ steps.version.outputs.VERSION }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ contains(github.ref, 'rc') || contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
          files: |
            dist/*.whl
            dist/*.tar.gz
            SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────
  # Step 4: Publish to PyPI (optional, requires OIDC setup)
  # ─────────────────────────────────────────────────────────────────────
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: release
    # Only publish on non-prerelease tag pushes. Manual dispatch runs
    # (workflow_dispatch) are preflight only — they exercise test → build →
    # dist-purity assert → checksum but MUST NOT publish to PyPI.
    if: ${{ github.event_name == 'push' && !contains(github.ref, 'rc') && !contains(github.ref, 'alpha') && !contains(github.ref, 'beta') }}
    environment: pypi
    permissions:
      id-token: write  # Required for Trusted Publisher (OIDC)
    steps:
      - name: Download dist artifact only
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Pre-publish dist/ purity guard
        # Re-asserts the dist-purity contract immediately before the upload
        # action enumerates dist/*. If anything other than .whl or .tar.gz
        # appears here, fail loudly rather than letting twine produce a
        # confusing `InvalidDistribution` error.
        run: |
          set -euo pipefail
          shopt -s nullglob
          extras=()
          for f in dist/*; do
            base="$(basename "$f")"
            case "$base" in
              *.whl|*.tar.gz) ;;
              *) extras+=("$base") ;;
            esac
          done
          if [ "${#extras[@]}" -gt 0 ]; then
            echo "ERROR: dist/ has non-distribution files entering the publish action: ${extras[*]}" >&2
            echo "       This is the v1.5.3 failure mode. See dist-purity contract in this workflow." >&2
            exit 1
          fi
          echo "Pre-publish dist/ purity OK:"
          ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # ─────────────────────────────────────────────────────────────────────
  # Step 5: Record clean publish event for the release-gate state cache
  # ─────────────────────────────────────────────────────────────────────
  #
  # Post-publish gate-state sync:
  #
  # The canonical release-gate state cache lives on the operator host
  # outside the repo. This job uploads a small artifact recording the
  # publish event ({tag, sha, run_id, timestamp}); a separate operator-side
  # helper polls the GitHub API for completed Release TokenPak runs,
  # downloads the artifact, and idempotently writes the corresponding
  # increment row + updates the cache row.
  #
  # Idempotency contract: the operator-side helper inserts only if no row
  # exists for this tag with cause='auto_publish_clean'. Re-running the
  # helper (or re-uploading the artifact) is a no-op.
  #
  # Gate parity: this job MUST run only when `publish` ran (i.e., real tag
  # push, non-prerelease). Manual workflow_dispatch preflight runs and
  # rc/alpha/beta tag pushes do NOT record a publish event — the gate
  # counter only decrements on real, clean, non-prerelease publishes.
  record-publish:
    name: Record Publish Event
    runs-on: ubuntu-latest
    needs: publish
    if: ${{ github.event_name == 'push' && !contains(github.ref, 'rc') && !contains(github.ref, 'alpha') && !contains(github.ref, 'beta') }}
    steps:
      - name: Compose publish-event payload
        id: payload
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          SHA="${GITHUB_SHA}"
          RUN_ID="${GITHUB_RUN_ID}"
          TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          mkdir -p publish-event
          cat > publish-event/event.json <<EOF
          {
            "tag": "${TAG}",
            "sha": "${SHA}",
            "run_id": "${RUN_ID}",
            "timestamp": "${TIMESTAMP}",
            "cause": "auto_publish_clean"
          }
          EOF
          echo "Publish event:"
          cat publish-event/event.json

      - name: Upload publish-event artifact
        uses: actions/upload-artifact@v4
        with:
          name: publish-event
          path: publish-event/
          retention-days: 90
