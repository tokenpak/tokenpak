name: Release TokenPak

on:
  # Manual-dispatch entry point for pre-tag preflight runs against any branch
  # (typically `main` immediately before pushing a tag). The dispatch uses the
  # same test → build → dist-purity assert → checksum job graph as a real tag
  # push; only the publish-to-PyPI job is skipped (see the publish job's `if:`).
  # Use:
  #   gh workflow run "Release TokenPak" --ref main
  # Then verify the run is green before `git push <tag>`.
  workflow_dispatch:
  push:
    tags:
      - 'v*'

# CI-stabilization: release runs only on tag push or manual dispatch.
# Branch-push (main) and pull_request triggers removed so ordinary
# staging pushes and PRs no longer fire the release gate.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write  # Required for creating releases

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Step 1: Run tests to ensure tag is release-worthy
  # ─────────────────────────────────────────────────────────────────────
  #
  # Test-gate contract (per the slim-install parity follow-up of 2026-05-08):
  #
  # This job installs only the [dev] extra — pytest, ruff, black, etc. — and
  # NOT [full] / [retrieval] / [intelligence] etc. That's intentional: the
  # auto-publish gate must pass on a slim install so users following the
  # documented "pip install tokenpak" path get the same suite that ships.
  #
  # Test files that depend on optional/external/internal modules MUST guard
  # their imports at module load time so collection succeeds without the
  # extra installed:
  #
  #   • Optional deps (numpy, fastapi, scipy, pandas, llmlingua, litellm) →
  #     `pytest.importorskip("dep_name", reason="...")` after `import pytest`.
  #
  #   • External packages bundled in extras (sentence-transformers, etc.) →
  #     same `pytest.importorskip` call.
  #
  #   • Symbols missing from a namespace package that DOES exist in slim OSS
  #     (e.g. `from tokenpak.compaction import CompactionMode` where
  #     `tokenpak.compaction/` is a namespace dir but the submodule isn't
  #     bundled) → wrap the import in
  #     `try: ... except ImportError as exc: pytest.skip(..., allow_module_level=True)`.
  #     `importorskip` on the bare namespace returns truthy and won't help here.
  #
  #   • Python-version-dependent stdlib modules (e.g. `tomllib` is stdlib only
  #     on 3.11+; absent on 3.10) → same `pytest.importorskip("tomllib", ...)`
  #     pattern. The test runs on the matrix versions where the stdlib module
  #     is available; coverage stays adequate via the supported-version matrix.
  #
  # When this gate is red, do NOT bypass it via `--ignore=...`. Either fix
  # the failing test's import guard or add the missing extra to this step.
  test:
    # Std 30 §3 (R3) install-shape parity: matrix runs slim/dev/full so the
    # release gate validates what each install shape actually ships.
    # Std 30 §4 (R4) collection-error visibility: --continue-on-collection-errors +
    # discrete collection_errors output.
    # Std 30 §5 (R5) test taxonomy markers: -m selection per shape per Std 30 §3.
    name: Run Tests (shape=${{ matrix.shape }} py=${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shape: [slim, dev, full]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (shape=${{ matrix.shape }})
        run: |
          python -m pip install --upgrade pip
          case "${{ matrix.shape }}" in
            slim) pip install -e . pytest pytest-asyncio pytest-benchmark pytest-mock ;;
            dev)  pip install -e ".[dev]" ;;
            full) pip install -e ".[dev,retrieval,code-compression,intelligence,data,compression]" ;;
          esac

      - name: Run tests with collection-error visibility
        id: pytest
        run: |
          case "${{ matrix.shape }}" in
            slim) MARKERS="oss" ;;
            dev)  MARKERS="oss or optional" ;;
            full) MARKERS="oss or optional or internal" ;;
          esac
          # IMPORTANT: pipe to tee, then capture pytest's exit code via
          # PIPESTATUS[0] — `$?` after a pipe captures TEE's exit (always 0)
          # which would silently swallow test failures. Std 30 §4 (R4) gate
          # depends on this being correct.
          set +e
          # Quarantine runner-sensitive perf/SLA tests (needs_fast_host) from the
          # blocking release gate: GitHub-hosted runners cannot meet wall-clock
          # throughput / p99 SLAs deterministically (e.g. test_load_100rps.py).
          # Mirrors the ci.yml quarantine (`not needs_fast_host`). Parens are
          # required — $MARKERS contains `or` and `and` binds tighter than `or`.
          pytest tests/ \
            -m "($MARKERS) and not needs_fast_host" \
            --continue-on-collection-errors \
            -q --tb=short \
            2>&1 | tee pytest-output.log
          PYTEST_RC=${PIPESTATUS[0]}
          set -e
          COLLECT_ERRORS=$(grep -c "^ERROR collecting" pytest-output.log || true)
          echo "collection_errors=$COLLECT_ERRORS" >> "$GITHUB_OUTPUT"
          echo "pytest_rc=$PYTEST_RC" >> "$GITHUB_OUTPUT"

      - name: Gate on collection errors (Std 30 §4)
        if: steps.pytest.outputs.collection_errors != '0'
        run: |
          echo "::error::Collection errors detected (count=${{ steps.pytest.outputs.collection_errors }}). See Std 30 §4 — collection errors are a distinct, non-mergeable error class."
          exit 1

      - name: Gate on test failures
        if: steps.pytest.outputs.pytest_rc != '0' && steps.pytest.outputs.collection_errors == '0'
        run: |
          echo "::error::pytest exited ${{ steps.pytest.outputs.pytest_rc }} with no collection errors — runtime failures."
          exit 1

      - name: Smoke test CLI
        if: matrix.shape == 'dev' && matrix.python-version == '3.12'
        run: python -m tokenpak.cli --help

  chaos-tests:
    name: Chaos tests release gate
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run make test-chaos
        run: |
          mkdir -p "release-readiness/${{ github.ref_name }}/test-chaos"
          set +e
          make PYTEST="python3 -m pytest" test-chaos 2>&1 | tee "release-readiness/${{ github.ref_name }}/test-chaos/test-chaos.log"
          CHAOS_RC=${PIPESTATUS[0]}
          set -e
          exit "$CHAOS_RC"
        env:
          TOKENPAK_TEST_MODE: "1"

      - name: Upload chaos release-readiness artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-readiness-${{ github.ref_name }}-test-chaos
          path: |
            release-readiness/${{ github.ref_name }}/test-chaos/
            tests/chaos/output/*.json
          if-no-files-found: ignore

  release-gate-snapshots:
    # Std 30 §7 + §13.3 (R7 + R11): snapshot checks before any build/release.
    name: Release-gate snapshot validation
    runs-on: ubuntu-latest
    env:
      # Skip first-run RBAC admin bootstrap during snapshot introspection so the
      # ephemeral admin password is never emitted into (public) CI logs.
      # See REIPO-SNAPGEN-LOG-HYGIENE-01.
      TOKENPAK_SNAPSHOT_GEN: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (all extras for canonical snapshot reproduction)
        # public-api.json captures the COMPLETE public surface, so the
        # snapshot validation MUST install every optional extra. Without
        # them, modules under telemetry/server (fastapi+pydantic),
        # vault/ingest/api (fastapi), retrieval (sentence-transformers),
        # etc. raise IMPORT_ERROR during snapshot generation and the diff
        # fires with phantom removals. Per Std 30 §3 (R3) install-shape
        # parity: the canonical snapshot install is the union of all
        # non-agent-framework extras, ensuring the checked-in snapshot is
        # stable across hosts.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,full,serve,telemetry,tokens,otel]"
          # python-multipart is required by FastAPI Form/UploadFile imports in
          # vault/ingest/api and similar surfaces; without it the canonical
          # snapshot generation raises IMPORT_ERROR on those modules and the
          # api-snapshot-check fires phantom-removal noise. It is not yet an
          # advertised optional extra, so install it explicitly here.
          pip install python-multipart
      - name: api-snapshot-check (Std 30 §7 R7)
        run: make api-snapshot-check
      - name: workflow-steps-check (Std 30 §13.3 R11)
        run: make workflow-steps-check
      - name: telemetry-check (Std 30 §7 R7)
        run: make telemetry-check
      - name: taxonomy-check (Std 30 §5 R5)
        run: make taxonomy-check

  # ─────────────────────────────────────────────────────────────────────
  # Step 1b: Full-tree public-leak gate (runs before build, gates build/publish)
  # ─────────────────────────────────────────────────────────────────────
  #
  # Scans the ENTIRE shipped artifact (built sdist + wheel) for internal
  # identity / workflow language, using the same forbidden-pattern register and
  # path-scoped allowlists as the per-PR delta gate
  # (.github/workflows/identity-language-check.yml). The delta gate only
  # re-checks files changed in a PR, so a reference in a file that no later PR
  # touches is never re-scanned and can ship. This job closes that blind spot.
  #
  # It runs on BOTH manual preflight (workflow_dispatch) and tag pushes, and the
  # build job below `needs:` it — so any leak fails before a distribution is
  # built or published.
  leak-scan:
    name: Public-leak scan (full shipped tree)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist + wheel for scanning
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Scan shipped artifact for public-leak patterns
        run: python scripts/release_gate/check_release_leaks.py --dist dist/

  # ─────────────────────────────────────────────────────────────────────
  # Step 2: Build distribution artifacts
  # ─────────────────────────────────────────────────────────────────────
  #
  # Dist-purity contract (per the v1.5.3 release-burn lesson of 2026-05-09):
  #
  # The `dist/` directory uploaded as the `dist` artifact MUST contain only
  # valid Python distribution files: `*.whl` and `*.tar.gz`. Nothing else.
  #
  # `pypa/gh-action-pypi-publish` enumerates `dist/*` and uploads each entry
  # to PyPI. Any non-distribution file (e.g. SHA256SUMS, RELEASE_NOTES.md)
  # is rejected with `InvalidDistribution: Unknown distribution format` and
  # the entire publish fails. This was the v1.5.3 failure mode and the same
  # defect documented in `feedback_release_path_hardening` ("SHA256SUMS
  # outside dist/").
  #
  # Therefore:
  #   • SHA256SUMS is generated at the repo root (./SHA256SUMS), NEVER inside dist/.
  #   • Checksums are uploaded as a separate `checksums` artifact.
  #   • The `release` job downloads both `dist` and `checksums` to attach
  #     everything to the GitHub Release.
  #   • The `publish` job downloads ONLY the `dist` artifact and runs a
  #     pre-publish guard that fails if `dist/` contains anything other than
  #     `*.whl` or `*.tar.gz`.
  #
  # If you add a new release artifact, give it its own artifact name; do
  # NOT drop it into `dist/`.
  build:
    name: Build Distribution
    runs-on: ubuntu-latest
    needs: [test, chaos-tests, release-gate-snapshots, leak-scan]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      # Tag-source ancestry validation: refuse to build a release from a v-tag
      # that is not reachable from origin/main. The job-level `if` already
      # restricts to refs/tags/v*, so rehearsal-* tags never reach here; the
      # step-level `if` additionally skips workflow_dispatch preflight (allowed
      # on any branch by contract). Enforces the staging -> public promotion path.
      - name: Validate tag source on origin/main
        run: |
          set -euo pipefail
          git fetch origin main --depth=200
          if git merge-base --is-ancestor "${{ github.sha }}" origin/main; then
            echo "::notice::Tag verified on origin/main"
          else
            echo "::error::Tag ${{ github.ref }} (sha ${{ github.sha }}) is not reachable from origin/main; refusing release. Releases must promote through staging to public main before tagging."
            exit 1
          fi

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build wheel and sdist
        run: python -m build

      - name: Verify package
        run: twine check dist/*

      - name: Assert dist/ purity (only .whl + .tar.gz)
        run: |
          set -euo pipefail
          shopt -s nullglob
          extras=()
          for f in dist/*; do
            base="$(basename "$f")"
            case "$base" in
              *.whl|*.tar.gz) ;;
              *) extras+=("$base") ;;
            esac
          done
          if [ "${#extras[@]}" -gt 0 ]; then
            echo "ERROR: dist/ contains non-distribution files: ${extras[*]}" >&2
            echo "       PyPI publish would fail. See dist-purity contract above." >&2
            exit 1
          fi
          echo "dist/ purity check OK:"
          ls -la dist/

      - name: Assert sdist / wheel content purity (Std 30 §13.1 R9)
        # Inclusion-direction guard: shipped artifacts MUST NOT contain
        # _internal/ paths. Catches the failure mode that R6/R7 don't
        # (those catch *removal* of public surfaces; this catches
        # *inclusion* of private surfaces in the OSS distribution).
        run: |
          set -euo pipefail
          if unzip -l dist/*.whl | grep -E '_internal/|tests/_internal/'; then
            echo "::error::wheel contains _internal/ paths — Std 30 §13.1 violation"
            exit 1
          fi
          if tar -tzf dist/*.tar.gz | grep -E '_internal/|tests/_internal/'; then
            echo "::error::sdist contains _internal/ paths — Std 30 §13.1 violation"
            exit 1
          fi
          echo "✅  sdist + wheel content purity: no _internal/ paths"

      - name: Generate checksums (outside dist/)
        run: |
          # SHA256SUMS lives at repo root, NEVER inside dist/.
          # See dist-purity contract on the build job.
          ( cd dist && sha256sum *.whl *.tar.gz ) > SHA256SUMS
          cat SHA256SUMS

      - name: Upload dist artifact (wheels + sdist only)
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Upload checksums artifact (SHA256SUMS only)
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: SHA256SUMS

  # ─────────────────────────────────────────────────────────────────────
  # Step 3: Create GitHub Release with artifacts
  # ─────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Download checksums artifact
        uses: actions/download-artifact@v8
        with:
          name: checksums
          path: .

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: notes
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}

          # Try to extract section from CHANGELOG.md
          if [ -f CHANGELOG.md ]; then
            # Extract the section for this version
            NOTES=$(awk "/## \[$VERSION\]|## $VERSION/{flag=1; next} /## \[|## [0-9]/{flag=0} flag" CHANGELOG.md)
          fi

          # Fallback if no changelog entry
          if [ -z "$NOTES" ]; then
            NOTES="Release v$VERSION

          ## Installation

          \`\`\`bash
          pip install tokenpak==$VERSION
          \`\`\`

          ## What's New

          See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.

          ## Checksums

          \`\`\`
          $(cat SHA256SUMS)
          \`\`\`
          "
          fi

          # Write to file for the release action
          echo "$NOTES" > RELEASE_NOTES.md
          cat RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: TokenPak v${{ steps.version.outputs.VERSION }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ contains(github.ref, 'rc') || contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
          files: |
            dist/*.whl
            dist/*.tar.gz
            SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────
  # Step 4: Publish to PyPI (optional, requires OIDC setup)
  # ─────────────────────────────────────────────────────────────────────
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: release
    # Std 30 §8 hard guard + non-prerelease only: never publish on rehearsal-*
    # tags, branch pushes, PRs, or rc/alpha/beta tags. Combined into a single
    # condition — GitHub Actions rejects duplicate `if:` per job. (Run
    # https://github.com/tokenpak/tokenpak/actions/runs/25609451614 was the
    # canonical failure case.)
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, 'rc') && !contains(github.ref, 'alpha') && !contains(github.ref, 'beta') }}
    environment: pypi
    permissions:
      id-token: write  # Required for Trusted Publisher (OIDC)
    steps:
      - name: Download dist artifact only
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Pre-publish dist/ purity guard
        # Re-asserts the dist-purity contract immediately before the upload
        # action enumerates dist/*. If anything other than .whl or .tar.gz
        # appears here, fail loudly rather than letting twine produce a
        # confusing `InvalidDistribution` error.
        run: |
          set -euo pipefail
          shopt -s nullglob
          extras=()
          for f in dist/*; do
            base="$(basename "$f")"
            case "$base" in
              *.whl|*.tar.gz) ;;
              *) extras+=("$base") ;;
            esac
          done
          if [ "${#extras[@]}" -gt 0 ]; then
            echo "ERROR: dist/ has non-distribution files entering the publish action: ${extras[*]}" >&2
            echo "       This is the v1.5.3 failure mode. See dist-purity contract in this workflow." >&2
            exit 1
          fi
          echo "Pre-publish dist/ purity OK:"
          ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
