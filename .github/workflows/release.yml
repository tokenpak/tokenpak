name: Release TokenPak

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # Required for creating releases

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Step 1: Run tests to ensure tag is release-worthy
  # ─────────────────────────────────────────────────────────────────────
  #
  # Test-gate contract (TIP7-001 + 2026-05-08 follow-up):
  #
  # This job installs only the [dev] extra — pytest, ruff, black, etc. — and
  # NOT [full] / [retrieval] / [intelligence] etc. That's intentional: the
  # auto-publish gate must pass on a slim install so users following the
  # documented "pip install tokenpak" path get the same suite that ships.
  #
  # Test files that depend on optional/external/internal modules MUST guard
  # their imports at module load time so collection succeeds without the
  # extra installed:
  #
  #   • Optional deps (numpy, fastapi, scipy, pandas, llmlingua, litellm) →
  #     `pytest.importorskip("dep_name", reason="...")` after `import pytest`.
  #
  #   • External packages bundled in extras (sentence-transformers, etc.) →
  #     same `pytest.importorskip` call.
  #
  #   • Symbols missing from a namespace package that DOES exist in slim OSS
  #     (e.g. `from tokenpak.compaction import CompactionMode` where
  #     `tokenpak.compaction/` is a namespace dir but the submodule isn't
  #     bundled) → wrap the import in
  #     `try: ... except ImportError as exc: pytest.skip(..., allow_module_level=True)`.
  #     `importorskip` on the bare namespace returns truthy and won't help here.
  #
  #   • Python-version-dependent stdlib modules (e.g. `tomllib` is stdlib only
  #     on 3.11+; absent on 3.10) → same `pytest.importorskip("tomllib", ...)`
  #     pattern. The test runs on the matrix versions where the stdlib module
  #     is available; coverage stays adequate via the supported-version matrix.
  #
  # When this gate is red, do NOT bypass it via `--ignore=...`. Either fix
  # the failing test's import guard or add the missing extra to this step.
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -q --tb=short

      - name: Smoke test CLI
        run: python -m tokenpak.cli --help

  # ─────────────────────────────────────────────────────────────────────
  # Step 2: Build distribution artifacts
  # ─────────────────────────────────────────────────────────────────────
  #
  # Dist-purity contract (TSR-08-D / 2026-05-09 v1.5.3 burn lesson):
  #
  # The `dist/` directory uploaded as the `dist` artifact MUST contain only
  # valid Python distribution files: `*.whl` and `*.tar.gz`. Nothing else.
  #
  # `pypa/gh-action-pypi-publish` enumerates `dist/*` and uploads each entry
  # to PyPI. Any non-distribution file (e.g. SHA256SUMS, RELEASE_NOTES.md)
  # is rejected with `InvalidDistribution: Unknown distribution format` and
  # the entire publish fails. This was the v1.5.3 failure mode and the same
  # defect documented in `feedback_release_path_hardening` ("SHA256SUMS
  # outside dist/").
  #
  # Therefore:
  #   • SHA256SUMS is generated at the repo root (./SHA256SUMS), NEVER inside dist/.
  #   • Checksums are uploaded as a separate `checksums` artifact.
  #   • The `release` job downloads both `dist` and `checksums` to attach
  #     everything to the GitHub Release.
  #   • The `publish` job downloads ONLY the `dist` artifact and runs a
  #     pre-publish guard that fails if `dist/` contains anything other than
  #     `*.whl` or `*.tar.gz`.
  #
  # If you add a new release artifact, give it its own artifact name; do
  # NOT drop it into `dist/`.
  build:
    name: Build Distribution
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build wheel and sdist
        run: python -m build

      - name: Verify package
        run: twine check dist/*

      - name: Assert dist/ purity (only .whl + .tar.gz)
        run: |
          set -euo pipefail
          shopt -s nullglob
          extras=()
          for f in dist/*; do
            base="$(basename "$f")"
            case "$base" in
              *.whl|*.tar.gz) ;;
              *) extras+=("$base") ;;
            esac
          done
          if [ "${#extras[@]}" -gt 0 ]; then
            echo "ERROR: dist/ contains non-distribution files: ${extras[*]}" >&2
            echo "       PyPI publish would fail. See dist-purity contract above." >&2
            exit 1
          fi
          echo "dist/ purity check OK:"
          ls -la dist/

      - name: Generate checksums (outside dist/)
        run: |
          # SHA256SUMS lives at repo root, NEVER inside dist/.
          # See dist-purity contract on the build job.
          ( cd dist && sha256sum *.whl *.tar.gz ) > SHA256SUMS
          cat SHA256SUMS

      - name: Upload dist artifact (wheels + sdist only)
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Upload checksums artifact (SHA256SUMS only)
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: SHA256SUMS

  # ─────────────────────────────────────────────────────────────────────
  # Step 3: Create GitHub Release with artifacts
  # ─────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Download checksums artifact
        uses: actions/download-artifact@v4
        with:
          name: checksums
          path: .

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: notes
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}

          # Try to extract section from CHANGELOG.md
          if [ -f CHANGELOG.md ]; then
            # Extract the section for this version
            NOTES=$(awk "/## \[$VERSION\]|## $VERSION/{flag=1; next} /## \[|## [0-9]/{flag=0} flag" CHANGELOG.md)
          fi

          # Fallback if no changelog entry
          if [ -z "$NOTES" ]; then
            NOTES="Release v$VERSION

          ## Installation

          \`\`\`bash
          pip install tokenpak==$VERSION
          \`\`\`

          ## What's New

          See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.

          ## Checksums

          \`\`\`
          $(cat SHA256SUMS)
          \`\`\`
          "
          fi

          # Write to file for the release action
          echo "$NOTES" > RELEASE_NOTES.md
          cat RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: TokenPak v${{ steps.version.outputs.VERSION }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ contains(github.ref, 'rc') || contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
          files: |
            dist/*.whl
            dist/*.tar.gz
            SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────
  # Step 4: Publish to PyPI (optional, requires OIDC setup)
  # ─────────────────────────────────────────────────────────────────────
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: release
    # Only publish on non-prerelease tags (no rc/alpha/beta)
    if: ${{ !contains(github.ref, 'rc') && !contains(github.ref, 'alpha') && !contains(github.ref, 'beta') }}
    environment: pypi
    permissions:
      id-token: write  # Required for Trusted Publisher (OIDC)
    steps:
      - name: Download dist artifact only
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Pre-publish dist/ purity guard
        # Re-asserts the dist-purity contract immediately before the upload
        # action enumerates dist/*. If anything other than .whl or .tar.gz
        # appears here, fail loudly rather than letting twine produce a
        # confusing `InvalidDistribution` error.
        run: |
          set -euo pipefail
          shopt -s nullglob
          extras=()
          for f in dist/*; do
            base="$(basename "$f")"
            case "$base" in
              *.whl|*.tar.gz) ;;
              *) extras+=("$base") ;;
            esac
          done
          if [ "${#extras[@]}" -gt 0 ]; then
            echo "ERROR: dist/ has non-distribution files entering the publish action: ${extras[*]}" >&2
            echo "       This is the v1.5.3 failure mode. See dist-purity contract in this workflow." >&2
            exit 1
          fi
          echo "Pre-publish dist/ purity OK:"
          ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
