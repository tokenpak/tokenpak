name: Performance Benchmarks

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs for the same PR/branch
concurrency:
  group: benchmarks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    name: Compile Latency (Python 3.12)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install pytest-benchmark

      # ── Download baseline from previous run (main branch only) ────────
      - name: Download baseline benchmarks
        uses: dawidd6/action-download-artifact@v3
        if: github.event_name == 'pull_request'
        with:
          name: benchmark-baseline
          branch: ${{ github.base_ref }}
          workflow: benchmarks.yml
          if_no_artifact_found: warn
          path: baseline/
        continue-on-error: true

      # ── Run benchmark suite ───────────────────────────────────────────
      - name: Run compile benchmarks
        run: |
          pytest tests/benchmarks/ \
            -v \
            --benchmark-json=benchmark.json \
            --benchmark-min-rounds=50 \
            --benchmark-sort=mean \
            --tb=short \
            2>&1 | tee benchmark_output.txt
          echo "--- BENCHMARK EXIT CODE: $? ---"

      # ── Enforce thresholds (hard gate) ───────────────────────────────
      - name: Check latency thresholds
        run: |
          python scripts/check_benchmark_thresholds.py benchmark.json
          echo "✅ All compile-time thresholds passed"

      - name: Generate benchmark report
        run: |
          python scripts/generate_benchmarks_report.py
          test -f docs/BENCHMARKS.md
          test -f artifacts/benchmark-summary.json

      # ── Regression detection (compare to baseline) ───────────────────
      - name: Regression detection vs baseline
        if: github.event_name == 'pull_request'
        run: |
          if [ -f "baseline/benchmark.json" ]; then
            echo "Comparing against baseline..."
            pytest tests/benchmarks/ \
              --benchmark-json=benchmark.json \
              --benchmark-compare=baseline/benchmark.json \
              --benchmark-compare-fail=mean:5% \
              --no-header -q 2>&1 | tail -20 || {
                echo "⚠️  Regression detected vs baseline (>5% mean latency increase)"
                exit 1
              }
          else
            echo "No baseline found — skipping regression comparison"
          fi

      # ── Post benchmark results as PR comment ─────────────────────────
      - name: Format PR comment
        if: github.event_name == 'pull_request'
        run: |
          COMPARE_FLAG=""
          if [ -f "baseline/benchmark.json" ]; then
            COMPARE_FLAG="--compare baseline/benchmark.json"
          fi
          python scripts/benchmark_comment.py benchmark.json $COMPARE_FLAG > pr_comment.md
          cat pr_comment.md

      - name: Post comment on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: tokenpak-benchmarks
          path: pr_comment.md

      # ── Save artifacts ────────────────────────────────────────────────
      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results
          path: |
            benchmark.json
            benchmark_output.txt
            artifacts/benchmark-summary.json
            docs/BENCHMARKS.md

      # Save as new baseline when merging to main
      - name: Save baseline (main branch only)
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
        with:
          name: benchmark-baseline
          path: benchmark.json
          overwrite: true
