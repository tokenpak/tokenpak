# TokenPak pre-commit hook configuration
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files
# Docs: https://pre-commit.com

repos:

  # ── Python linting & formatting (Ruff) ────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        name: ruff lint
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi]
      - id: ruff-format
        name: ruff format
        types_or: [python, pyi]

  # ── General file hygiene ────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        name: Trim trailing whitespace
      - id: end-of-file-fixer
        name: Fix end of file (ensure newline)
      - id: check-yaml
        name: Validate YAML syntax
      - id: check-toml
        name: Validate TOML syntax
      - id: check-json
        name: Validate JSON syntax
      - id: check-merge-conflict
        name: Detect merge conflict markers
      - id: check-added-large-files
        name: Block large files (> 1MB)
        args: [--maxkb=1024]
      - id: debug-statements
        name: Check for debug statements (pdb, breakpoint)
      - id: check-case-conflict
        name: Check for case-insensitive filename conflicts

  # ── Secret detection ────────────────────────────────────────────────────
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        name: Detect secrets
        args: [--baseline, .secrets.baseline]
        exclude: tests/.*|\.env\.example

# ── Global exclusions ─────────────────────────────────────────────────────
exclude: |
  (?x)^(
    \.venv/|
    dist/|
    build/|
    .*\.egg-info/|
    htmlcov/|
    \.git/
  )$
