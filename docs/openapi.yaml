openapi: "3.1.0"

info:
  title: TokenPak Proxy API
  version: "1.0.2"
  description: |
    TokenPak is a drop-in HTTP proxy that sits between your app and LLM APIs.
    It compresses requests, deduplicates cache hits, and tracks token spend —
    with zero SDK changes required.

    ## Usage

    Point your LLM client at `http://localhost:8766` instead of the provider endpoint:

    ```bash
    ANTHROPIC_BASE_URL=http://localhost:8766 claude-code ...
    OPENAI_BASE_URL=http://localhost:8766/v1 openai ...
    ```

    ## Authentication

    The proxy forwards your API key to the upstream provider. Set the standard
    provider environment variables (`ANTHROPIC_API_KEY`, `OPENAI_API_KEY`, etc.)
    or pass them in the `Authorization` / `x-api-key` header as usual.

  contact:
    name: TokenPak
    url: https://github.com/tokenpak/tokenpak
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0

servers:
  - url: http://localhost:8766
    description: Local proxy (default port)

tags:
  - name: passthrough
    description: LLM API passthrough (forwarded to upstream providers)
  - name: health
    description: Proxy health and readiness
  - name: stats
    description: Request and token usage statistics
  - name: traces
    description: Per-request pipeline trace inspection
  - name: cache
    description: Cache statistics and management
  - name: vault
    description: Vault index diagnostics
  - name: metrics
    description: Prometheus and dashboard metrics
  - name: ingest
    description: Document ingestion into vault context
  - name: degradation
    description: Circuit breaker and degradation state

paths:

  # ─── LLM Passthrough ──────────────────────────────────────────────────────

  /v1/messages:
    post:
      operationId: createMessage
      summary: Anthropic Messages API (passthrough)
      description: |
        Drop-in replacement for the Anthropic `/v1/messages` endpoint.
        TokenPak compresses the context before forwarding, then returns the
        upstream response unchanged.
      tags: [passthrough]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnthropicMessagesRequest"
            example:
              model: claude-sonnet-4-5
              max_tokens: 1024
              messages:
                - role: user
                  content: Hello, world!
      responses:
        "200":
          description: Upstream Anthropic response (unmodified)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicMessagesResponse"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"
        "502":
          $ref: "#/components/responses/UpstreamError"

  /v1/messages/forecast:
    post:
      operationId: forecastMessageCost
      summary: Cost forecast (local, no upstream call)
      description: |
        Estimates the cost of a `/v1/messages` request before it is sent.
        Accepts the same body shape as `/v1/messages`. Runs `count_tokens`
        locally, applies the model pricing config, and returns an estimated
        cost breakdown. **No upstream API call is made.**

        Used by IDE plugins for inline cost previews and TUI mode for
        "are you sure?" prompts on expensive turns (AC-3.3).
      tags: [passthrough]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnthropicMessagesRequest"
            example:
              model: claude-sonnet-4-5
              messages:
                - role: user
                  content: Summarise this document…
      responses:
        "200":
          description: Cost forecast for the given request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CostForecastResponse"
              example:
                estimated_cost_usd: 0.00023
                ttfb_estimate_ms: 800
                cache_hit_likelihood: 0.5
                breakdown:
                  input_tokens: 42
                  output_estimate: 500
                  cache_hits_estimate: 0
                  cache_creates_estimate: 0
        "400":
          $ref: "#/components/responses/BadRequest"

  /v1/chat/completions:
    post:
      operationId: createChatCompletion
      summary: OpenAI Chat Completions API (passthrough)
      description: |
        Drop-in replacement for the OpenAI `/v1/chat/completions` endpoint.
        Supports streaming (`stream: true`).
      tags: [passthrough]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenAIChatRequest"
            example:
              model: gpt-4o
              messages:
                - role: user
                  content: What is the capital of France?
      responses:
        "200":
          description: OpenAI chat completion response (unmodified)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenAIChatResponse"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"
        "502":
          $ref: "#/components/responses/UpstreamError"

  # ─── Health ───────────────────────────────────────────────────────────────

  /health:
    get:
      operationId: getHealth
      summary: Proxy health check
      description: |
        Returns an uncached operational snapshot. Add `?deep=true` for
        provider, process-memory, and disk diagnostics. Optional measurements
        are reported as unavailable, never as an invented zero. Loopback
        clients require no proxy credential. Non-loopback clients must set
        `TOKENPAK_PROXY_AUTH_TOKEN` on the proxy and send the matching value as
        `Authorization: Bearer <token>`; when the setting is absent,
        non-loopback access fails closed with 403.
      tags: [health]
      security:
        - ProxyBearerAuth: []
        - {}
      parameters:
        - name: deep
          in: query
          required: false
          description: Include additive provider, process-memory, and disk diagnostics.
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Proxy is running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: ok
                uptime_seconds: 3600
                version: 1.14.0
                requests_total: 42
                requests_errors: 0
                compression_ratio_avg: 0.72
                is_degraded: false
                is_shutting_down: false
                in_flight_requests: 0
                memory_guard:
                  enabled: false
                  state: disabled
                  thread_alive: false
                  callback_policy: disabled
                  configuration:
                    source: default
                    mode: "off"
                    plan_sha256: null
                    managed_config_path: /home/user/.tokenpak/memory-optimization.json
                    managed_file_present: false
                    managed_file_ignored: false
                    triggering_env: []
                    warning: null
                  callbacks:
                    compact: false
                    token: false
                    semantic: false
                admission:
                  limit: 16
                  available: 16
                  rejected: 0
                agent_concurrency:
                  enabled: true
                  max_parallel_subagents: 2
                  effective_cap: 2
                  degraded_serial: false
                  in_flight: 0
                  queued: 0
                  queue_depth_max: 14
                  admitted_total: 0
                  queued_total: 0
                  rejected_queue_full: 0
                  rejected_wait_timeout: 0
                  source: config
                timestamp: "2026-07-23T19:10:00Z"
                connection_pool:
                  http2_enabled: true
                  active_providers: []
                  total_requests: 0
                  reused_connections: 0
                  new_connections: 0
                  errors: 0
                  evicted_clients: 0
                  reuse_rate: 0.0
                  cleanup_pending_close: 0
                  cleanup_queued: 0
                  cleanup_in_progress: 0
                  cleanup_retrying: 0
                  cleanup_failures_total: 0
                  cleanup_worker_start_failures_total: 0
                  cleanup_completed_total: 0
                  cleanup_oldest_pending_seconds: 0.0
                  cleanup_workers_alive: 0
                  client_slots_used: 0
                  client_slots_max: 64
                  client_capacity_rejections_total: 0
                  cleanup_saturated: false
                  retired_pending_close: 0
                circuit_breakers:
                  enabled: true
                  any_open: false
                  providers: {}
        "401":
          description: Non-loopback proxy authorization is configured, but the Bearer token is missing, malformed, or incorrect.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  type: unauthorized
                  message: invalid or missing proxy auth token
        "403":
          description: Non-loopback access is forbidden because TOKENPAK_PROXY_AUTH_TOKEN is not configured on the proxy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  type: forbidden
                  message: non-localhost access requires TOKENPAK_PROXY_AUTH_TOKEN

  # ─── Stats ────────────────────────────────────────────────────────────────

  /stats:
    get:
      operationId: getStats
      summary: Full session statistics
      description: Returns complete stats including session totals, vault index state, recent requests, and per-model breakdown.
      tags: [stats]
      responses:
        "200":
          description: Full stats object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsResponse"

  /stats/last:
    get:
      operationId: getLastRequestStats
      summary: Last request statistics
      description: Returns per-request stats for the most recently processed request.
      tags: [stats]
      responses:
        "200":
          description: Last request stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LastRequestStats"
              example:
                request_id: req_abc123
                timestamp: "2026-03-25T09:00:00Z"
                model: claude-sonnet-4-5
                tokens_saved: 420
                percent_saved: 32.1
                cost_saved: 0.0012
                session_total_saved: 0.0452
                session_requests: 14
                input_tokens_raw: 1310
                input_tokens_sent: 890
                output_tokens: 256

  /stats/session:
    get:
      operationId: getSessionStats
      summary: Session aggregate statistics
      description: Returns aggregated stats for the current proxy session.
      tags: [stats]
      responses:
        "200":
          description: Session stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionStats"

  /recent:
    get:
      operationId: getRecentRequests
      summary: Recent 50 requests
      description: Returns metadata for the 50 most recent requests processed by the proxy.
      tags: [stats]
      responses:
        "200":
          description: Recent requests list
          content:
            application/json:
              schema:
                type: object
                properties:
                  recent:
                    type: array
                    items:
                      $ref: "#/components/schemas/RequestSummary"

  # ─── Traces ───────────────────────────────────────────────────────────────

  /traces:
    get:
      operationId: listTraces
      summary: List all pipeline traces
      description: Returns all captured request pipeline traces (compression, injection, routing steps).
      tags: [traces]
      responses:
        "200":
          description: Trace list
          content:
            application/json:
              schema:
                type: object
                properties:
                  traces:
                    type: array
                    items:
                      $ref: "#/components/schemas/Trace"
                  count:
                    type: integer

  /trace/last:
    get:
      operationId: getLastTrace
      summary: Last request pipeline trace
      description: Returns the full pipeline trace for the most recently processed request.
      tags: [traces]
      responses:
        "200":
          description: Trace object or not-found error
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Trace"
                  - $ref: "#/components/schemas/ErrorResponse"

  /trace/{request_id}:
    get:
      operationId: getTraceById
      summary: Pipeline trace by request ID
      description: Returns the full pipeline trace for a specific request ID.
      tags: [traces]
      parameters:
        - name: request_id
          in: path
          required: true
          schema:
            type: string
          example: req_abc123
      responses:
        "200":
          description: Trace object or not-found error
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Trace"
                  - $ref: "#/components/schemas/ErrorResponse"

  # ─── Cache ────────────────────────────────────────────────────────────────

  /cache-stats:
    get:
      operationId: getCacheStats
      summary: Cache statistics
      description: Returns cache hit/miss counts, token savings, and efficiency metrics.
      tags: [cache]
      responses:
        "200":
          description: Cache statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CacheStats"

  # ─── Vault ────────────────────────────────────────────────────────────────

  /vault:
    get:
      operationId: getVaultIndex
      summary: Vault index debug info
      description: Returns the current state of the vault index including all loaded blocks.
      tags: [vault]
      responses:
        "200":
          description: Vault index state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VaultInfo"

  # ─── Metrics ──────────────────────────────────────────────────────────────

  /metrics:
    get:
      operationId: getPrometheusMetrics
      summary: Prometheus metrics
      description: Returns counters and gauges in Prometheus text format (text/plain).
      tags: [metrics]
      responses:
        "200":
          description: Prometheus text format metrics
          content:
            text/plain:
              schema:
                type: string
              example: |
                # HELP tokenpak_requests_total Total requests processed
                # TYPE tokenpak_requests_total counter
                tokenpak_requests_total 42

  /metrics/dashboard:
    get:
      operationId: getDashboardMetrics
      summary: Comprehensive dashboard metrics (JSON)
      description: |
        Returns 8 key metrics in a single JSON response suitable for dashboards:
        request count + throughput, latency histogram, model distribution,
        routing decisions, cache hit ratio, error rate, streaming count,
        and 24-hour rolling window stats.
      tags: [metrics]
      responses:
        "200":
          description: Dashboard metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardMetrics"

  # ─── Degradation / Circuit Breakers ───────────────────────────────────────

  /degradation:
    get:
      operationId: getDegradationState
      summary: Degradation and circuit breaker state
      description: Returns whether the proxy is operating in degraded mode and details of any recent degradation events.
      tags: [degradation]
      responses:
        "200":
          description: Degradation state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DegradationState"

  /circuit-breakers:
    get:
      operationId: getCircuitBreakers
      summary: Circuit breaker status for all providers
      description: Returns enabled state and per-provider circuit breaker open/closed status.
      tags: [degradation]
      responses:
        "200":
          description: Circuit breaker registry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CircuitBreakerRegistry"

  # ─── Ingest ───────────────────────────────────────────────────────────────

  /ingest:
    post:
      operationId: ingestDocument
      summary: Ingest a document into vault context
      description: Parses and indexes a document (text, markdown, code, etc.) into the vault for context injection.
      tags: [ingest]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IngestRequest"
            example:
              content: "# My Document\nThis is the content to index."
              source_path: /home/user/docs/my-doc.md
              risk_class: low
      responses:
        "200":
          description: Ingest result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /ingest/batch:
    post:
      operationId: ingestBatch
      summary: Batch ingest multiple documents
      description: Ingest multiple documents in a single request.
      tags: [ingest]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IngestBatchRequest"
      responses:
        "200":
          description: Batch ingest results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestBatchResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  # ─── Interactive Docs ─────────────────────────────────────────────────────

  /docs:
    get:
      operationId: getSwaggerUI
      summary: Interactive API documentation (Swagger UI)
      description: Serves a Swagger UI page for browsing and testing the API.
      tags: [health]
      responses:
        "200":
          description: Swagger UI HTML page
          content:
            text/html:
              schema:
                type: string


# ─── Components ─────────────────────────────────────────────────────────────

components:
  securitySchemes:
    ProxyBearerAuth:
      type: http
      scheme: bearer
      description: |
        Proxy-level token from `TOKENPAK_PROXY_AUTH_TOKEN`. Required only for
        non-loopback clients. This credential is removed before upstream
        forwarding and is distinct from provider credentials.

  schemas:

    # ── LLM passthrough schemas ──────────────────────────────────────────────

    AnthropicMessagesRequest:
      type: object
      required: [model, max_tokens, messages]
      properties:
        model:
          type: string
          example: claude-sonnet-4-5
        max_tokens:
          type: integer
          example: 1024
        messages:
          type: array
          items:
            $ref: "#/components/schemas/Message"
        system:
          type: string
        stream:
          type: boolean
          default: false
        temperature:
          type: number
          minimum: 0
          maximum: 1
        top_p:
          type: number

    CostForecastResponse:
      type: object
      description: Estimated cost breakdown for a /v1/messages request (local, no upstream call).
      properties:
        estimated_cost_usd:
          type: number
          format: float
          description: Estimated total cost in USD.
          example: 0.00023
        ttfb_estimate_ms:
          type: integer
          description: Estimated time-to-first-byte in milliseconds, derived from rolling average of recent requests.
          example: 800
        cache_hit_likelihood:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: Estimated probability of a cache hit for this session (0.0–1.0). Defaults to 0.5 if no session history is available.
          example: 0.5
        breakdown:
          type: object
          description: Token-level breakdown used to compute the estimate.
          properties:
            input_tokens:
              type: integer
              description: Total input tokens counted locally.
              example: 42
            output_estimate:
              type: integer
              description: Estimated output tokens (defaults to 500; set to max_tokens when max_tokens < 500).
              example: 500
            cache_hits_estimate:
              type: integer
              description: Estimated tokens served from cache.
              example: 0
            cache_creates_estimate:
              type: integer
              description: Estimated tokens that will create new cache entries (from cache_control hints).
              example: 0

    AnthropicMessagesResponse:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          example: message
        role:
          type: string
          example: assistant
        content:
          type: array
          items:
            type: object
        model:
          type: string
        stop_reason:
          type: string
        usage:
          $ref: "#/components/schemas/AnthropicUsage"

    AnthropicUsage:
      type: object
      properties:
        input_tokens:
          type: integer
        output_tokens:
          type: integer
        cache_read_input_tokens:
          type: integer
        cache_creation_input_tokens:
          type: integer

    OpenAIChatRequest:
      type: object
      required: [model, messages]
      properties:
        model:
          type: string
          example: gpt-4o
        messages:
          type: array
          items:
            $ref: "#/components/schemas/Message"
        stream:
          type: boolean
          default: false
        temperature:
          type: number
        max_tokens:
          type: integer
        top_p:
          type: number

    OpenAIChatResponse:
      type: object
      properties:
        id:
          type: string
        object:
          type: string
          example: chat.completion
        created:
          type: integer
        model:
          type: string
        choices:
          type: array
          items:
            type: object
        usage:
          type: object

    Message:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          enum: [user, assistant, system]
        content:
          oneOf:
            - type: string
            - type: array
              items:
                type: object

    # ── Health ────────────────────────────────────────────────────────────────

    HealthResponse:
      type: object
      additionalProperties: false
      required:
        - status
        - uptime_seconds
        - version
        - requests_total
        - requests_errors
        - compression_ratio_avg
        - is_degraded
        - is_shutting_down
        - in_flight_requests
        - memory_guard
        - admission
        - agent_concurrency
        - timestamp
        - connection_pool
        - circuit_breakers
      properties:
        status:
          type: string
          enum: [ok, degraded, shutting_down]
        uptime_seconds:
          type: integer
        version:
          type: string
        requests_total:
          type: integer
        requests_errors:
          type: integer
        compression_ratio_avg:
          type: number
        is_degraded:
          type: boolean
        is_shutting_down:
          type: boolean
        in_flight_requests:
          type: integer
          minimum: 0
        memory_guard:
          $ref: "#/components/schemas/HealthMemoryGuard"
        admission:
          $ref: "#/components/schemas/HealthAdmission"
        agent_concurrency:
          $ref: "#/components/schemas/HealthAgentConcurrency"
        timestamp:
          type: string
          format: date-time
        connection_pool:
          $ref: "#/components/schemas/HealthConnectionPool"
        circuit_breakers:
          $ref: "#/components/schemas/HealthCircuitBreakers"
        providers:
          description: Present only with `deep=true`.
          type: array
          items:
            $ref: "#/components/schemas/HealthProviderDiagnostic"
        memory:
          description: Present only with `deep=true`; unavailable measurements use null plus typed availability metadata.
          $ref: "#/components/schemas/HealthMemoryMeasurement"
        disk:
          description: Present only with `deep=true`.
          $ref: "#/components/schemas/HealthDiskMeasurement"

    HealthMemoryGuard:
      oneOf:
        - $ref: "#/components/schemas/HealthMemoryGuardDisabled"
        - $ref: "#/components/schemas/HealthMemoryGuardEnabled"

    HealthMemoryGuardDisabled:
      type: object
      additionalProperties: false
      required: [enabled, state, thread_alive, callback_policy, configuration, callbacks]
      properties:
        enabled:
          const: false
        state:
          const: disabled
        thread_alive:
          const: false
        callback_policy:
          const: disabled
        configuration:
          $ref: "#/components/schemas/HealthMemoryGuardConfiguration"
        callbacks:
          $ref: "#/components/schemas/HealthMemoryGuardCallbacks"

    HealthMemoryGuardEnabled:
      type: object
      additionalProperties: false
      required:
        - enabled
        - state
        - thread_alive
        - callback_policy
        - configuration
        - callbacks
        - checks
        - measurement_errors
        - gc_runs
        - trim_runs
        - yellow_triggers
        - red_triggers
        - sys_low_triggers
        - suppressed_actions
        - observed_pressure_checks
        - compact_evictions
        - token_evictions
        - semantic_evictions
        - peak_rss_mb
        - last_rss_mb
        - last_sys_avail_mb
        - last_level
        - last_reclaimed_mb
        - total_reclaimed_mb
        - pressure_latched
        - last_error
        - measurement
        - thread_ident
        - stopping
        - config
      properties:
        enabled:
          const: true
        state:
          type: string
          enum: [created, unsupported, running, start_failed, stopped, stop_timeout, degraded]
        thread_alive:
          type: boolean
        callback_policy:
          type: string
          enum: [caller_supplied_eviction_callbacks, gc_trim_only_no_unbounded_disposable_proxy_cache]
        configuration:
          $ref: "#/components/schemas/HealthMemoryGuardConfiguration"
        callbacks:
          $ref: "#/components/schemas/HealthMemoryGuardCallbacks"
        checks:
          type: integer
          minimum: 0
        measurement_errors:
          type: integer
          minimum: 0
        gc_runs:
          type: integer
          minimum: 0
        trim_runs:
          type: integer
          minimum: 0
        yellow_triggers:
          type: integer
          minimum: 0
        red_triggers:
          type: integer
          minimum: 0
        sys_low_triggers:
          type: integer
          minimum: 0
        suppressed_actions:
          type: integer
          minimum: 0
        observed_pressure_checks:
          type: integer
          minimum: 0
        compact_evictions:
          type: integer
          minimum: 0
        token_evictions:
          type: integer
          minimum: 0
        semantic_evictions:
          type: integer
          minimum: 0
        peak_rss_mb:
          type: number
          minimum: 0
        last_rss_mb:
          type: [number, "null"]
          minimum: 0
        last_sys_avail_mb:
          type: [number, "null"]
          minimum: 0
        last_level:
          type: string
          enum: [UNKNOWN, GREEN, YELLOW, RED, RECOVERY]
        last_reclaimed_mb:
          type: number
          minimum: 0
        total_reclaimed_mb:
          type: number
          minimum: 0
        pressure_latched:
          type: boolean
        last_error:
          type: [string, "null"]
        measurement:
          $ref: "#/components/schemas/HealthMemoryMeasurementSupport"
        thread_ident:
          type: [integer, "null"]
        stopping:
          type: boolean
        config:
          $ref: "#/components/schemas/HealthMemoryGuardRuntimeConfig"

    HealthMemoryGuardConfiguration:
      type: object
      additionalProperties: false
      required:
        - source
        - mode
        - plan_sha256
        - managed_config_path
        - managed_file_present
        - managed_file_ignored
        - triggering_env
        - warning
      properties:
        source:
          type: string
          enum: [default, environment, managed, managed_error]
        mode:
          type: string
          enum: ["off", observe, auto]
        plan_sha256:
          type: [string, "null"]
        managed_config_path:
          type: [string, "null"]
        managed_file_present:
          type: boolean
        managed_file_ignored:
          type: boolean
        triggering_env:
          type: array
          items:
            type: string
        warning:
          type: [string, "null"]

    HealthMemoryGuardCallbacks:
      type: object
      additionalProperties: false
      required: [compact, token, semantic]
      properties:
        compact:
          type: boolean
        token:
          type: boolean
        semantic:
          type: boolean

    HealthMemoryMeasurementSupport:
      type: object
      additionalProperties: false
      required: [supported, platform, source, reason]
      properties:
        supported:
          type: boolean
        platform:
          type: string
        source:
          type: [string, "null"]
          enum: [procfs, psutil, null]
        reason:
          type: [string, "null"]

    HealthMemoryGuardRuntimeConfig:
      type: object
      additionalProperties: false
      required: [action_mode, target_mb, ceiling_mb, hysteresis_mb, sys_low_mb, check_interval_secs, cooldown_secs]
      properties:
        action_mode:
          type: string
          enum: [observe, auto]
        target_mb:
          type: integer
          minimum: 0
        ceiling_mb:
          type: integer
          minimum: 0
        hysteresis_mb:
          type: integer
          minimum: 0
        sys_low_mb:
          type: integer
          minimum: 0
        check_interval_secs:
          type: number
          minimum: 0
        cooldown_secs:
          type: number
          minimum: 0

    HealthAdmission:
      type: object
      additionalProperties: false
      required: [limit, available, rejected]
      properties:
        limit:
          type: integer
          minimum: 0
        available:
          type: integer
          minimum: 0
        rejected:
          type: integer
          minimum: 0

    HealthAgentConcurrency:
      oneOf:
        - $ref: "#/components/schemas/HealthAgentConcurrencyDisabled"
        - $ref: "#/components/schemas/HealthAgentConcurrencyEnabled"

    HealthAgentConcurrencyDisabled:
      type: object
      additionalProperties: false
      required: [enabled]
      properties:
        enabled:
          const: false

    HealthAgentConcurrencyEnabled:
      type: object
      additionalProperties: false
      required:
        - enabled
        - max_parallel_subagents
        - effective_cap
        - degraded_serial
        - in_flight
        - queued
        - queue_depth_max
        - admitted_total
        - queued_total
        - rejected_queue_full
        - rejected_wait_timeout
        - source
      properties:
        enabled:
          const: true
        max_parallel_subagents:
          type: integer
          minimum: 1
        effective_cap:
          type: integer
          minimum: 1
        degraded_serial:
          type: boolean
        in_flight:
          type: integer
          minimum: 0
        queued:
          type: integer
          minimum: 0
        queue_depth_max:
          type: integer
          minimum: 0
        admitted_total:
          type: integer
          minimum: 0
        queued_total:
          type: integer
          minimum: 0
        rejected_queue_full:
          type: integer
          minimum: 0
        rejected_wait_timeout:
          type: integer
          minimum: 0
        source:
          type: string

    HealthConnectionPool:
      type: object
      additionalProperties: false
      required:
        - http2_enabled
        - active_providers
        - total_requests
        - reused_connections
        - new_connections
        - errors
        - evicted_clients
        - reuse_rate
        - cleanup_pending_close
        - cleanup_queued
        - cleanup_in_progress
        - cleanup_retrying
        - cleanup_failures_total
        - cleanup_worker_start_failures_total
        - cleanup_completed_total
        - cleanup_oldest_pending_seconds
        - cleanup_workers_alive
        - client_slots_used
        - client_slots_max
        - client_capacity_rejections_total
        - cleanup_saturated
        - retired_pending_close
      properties:
        http2_enabled:
          type: boolean
        active_providers:
          type: array
          items:
            type: string
        total_requests:
          type: integer
          minimum: 0
        reused_connections:
          type: integer
          minimum: 0
        new_connections:
          type: integer
          minimum: 0
        errors:
          type: integer
          minimum: 0
        evicted_clients:
          type: integer
          minimum: 0
        reuse_rate:
          type: number
          minimum: 0
          maximum: 1
        cleanup_pending_close:
          type: integer
          minimum: 0
        cleanup_queued:
          type: integer
          minimum: 0
        cleanup_in_progress:
          type: integer
          minimum: 0
        cleanup_retrying:
          type: integer
          minimum: 0
        cleanup_failures_total:
          type: integer
          minimum: 0
        cleanup_worker_start_failures_total:
          type: integer
          minimum: 0
        cleanup_completed_total:
          type: integer
          minimum: 0
        cleanup_oldest_pending_seconds:
          type: number
          minimum: 0
        cleanup_workers_alive:
          type: integer
          minimum: 0
        client_slots_used:
          type: integer
          minimum: 0
        client_slots_max:
          type: integer
          minimum: 0
        client_capacity_rejections_total:
          type: integer
          minimum: 0
        cleanup_saturated:
          type: boolean
        retired_pending_close:
          type: integer
          minimum: 0

    HealthCircuitBreakers:
      type: object
      additionalProperties: false
      required: [enabled, any_open, providers]
      properties:
        enabled:
          type: boolean
        any_open:
          type: boolean
        providers:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/HealthCircuitBreakerProvider"

    HealthCircuitBreakerProvider:
      type: object
      additionalProperties: false
      required:
        - state
        - failures_in_window
        - successes_in_window
        - failure_ratio
        - failure_threshold
        - min_failure_ratio
        - time_until_probe_seconds
        - total_trips
        - total_successes
        - total_failures
      properties:
        state:
          type: string
          enum: [closed, open, half_open]
        failures_in_window:
          type: integer
          minimum: 0
        successes_in_window:
          type: integer
          minimum: 0
        failure_ratio:
          type: number
          minimum: 0
          maximum: 1
        failure_threshold:
          type: integer
          minimum: 0
        min_failure_ratio:
          type: number
          minimum: 0
          maximum: 1
        time_until_probe_seconds:
          type: [number, "null"]
          minimum: 0
        total_trips:
          type: integer
          minimum: 0
        total_successes:
          type: integer
          minimum: 0
        total_failures:
          type: integer
          minimum: 0

    HealthProviderDiagnostic:
      type: object
      additionalProperties: false
      required: [name, status]
      properties:
        name:
          type: string
        status:
          type: string
          enum: [closed, open, half_open, unknown]

    HealthMemoryMeasurement:
      oneOf:
        - type: object
          additionalProperties: false
          required: [rss_mb, available]
          properties:
            rss_mb:
              type: number
              minimum: 0
            available:
              const: true
        - type: object
          additionalProperties: false
          required: [rss_mb, available, reason]
          properties:
            rss_mb:
              type: "null"
            available:
              const: false
            reason:
              type: string
              enum: [optional_dependency_unavailable, probe_failed]

    HealthDiskMeasurement:
      oneOf:
        - type: object
          additionalProperties: false
          required: [available_gb, available]
          properties:
            available_gb:
              type: number
              minimum: 0
            available:
              const: true
        - type: object
          additionalProperties: false
          required: [available_gb, available, reason]
          properties:
            available_gb:
              type: "null"
            available:
              const: false
            reason:
              type: string
              enum: [probe_failed]

    # ── Stats ─────────────────────────────────────────────────────────────────

    StatsResponse:
      type: object
      properties:
        session:
          type: object
        compilation_mode:
          type: string
        vault_index:
          $ref: "#/components/schemas/VaultIndexSummary"
        router:
          type: object
        today:
          type: object
        by_model:
          type: object
        recent:
          type: array
          items:
            $ref: "#/components/schemas/RequestSummary"

    LastRequestStats:
      type: object
      properties:
        request_id:
          type: string
        timestamp:
          type: string
          format: date-time
        model:
          type: string
        tokens_saved:
          type: integer
        percent_saved:
          type: number
        cost_saved:
          type: number
        session_total_saved:
          type: number
        session_requests:
          type: integer
        input_tokens_raw:
          type: integer
        input_tokens_sent:
          type: integer
        output_tokens:
          type: integer

    SessionStats:
      type: object
      properties:
        session_requests:
          type: integer
        session_total_saved:
          type: number
        tokens_saved:
          type: integer
        tokens_sent:
          type: integer
        tokens_raw:
          type: integer
        output_tokens:
          type: integer
        total_cost:
          type: number
        uptime_hours:
          type: number
        errors:
          type: integer
        avg_savings_pct:
          type: number

    SessionStatsSummary:
      type: object
      properties:
        requests:
          type: integer
        input_tokens:
          type: integer
        sent_input_tokens:
          type: integer
        saved_tokens:
          type: integer
        errors:
          type: integer
        cache_hits:
          type: integer
        cost:
          type: number

    RequestSummary:
      type: object
      properties:
        request_id:
          type: string
        timestamp:
          type: string
          format: date-time
        model:
          type: string
        latency_ms:
          type: number
        status_code:
          type: integer
        tokens_saved:
          type: integer

    # ── Traces ────────────────────────────────────────────────────────────────

    Trace:
      type: object
      properties:
        request_id:
          type: string
        timestamp:
          type: string
          format: date-time
        model:
          type: string
        pipeline_steps:
          type: array
          items:
            type: object
        input_tokens_raw:
          type: integer
        input_tokens_sent:
          type: integer
        output_tokens:
          type: integer

    # ── Cache ─────────────────────────────────────────────────────────────────

    CacheStats:
      type: object
      properties:
        hits:
          type: integer
        misses:
          type: integer
        hit_ratio:
          type: number
        read_tokens:
          type: integer
        creation_tokens:
          type: integer
        total_savings_usd:
          type: number

    # ── Vault ─────────────────────────────────────────────────────────────────

    VaultInfo:
      type: object
      properties:
        available:
          type: boolean
        blocks:
          type: integer
        total_tokens:
          type: integer
        path:
          type: string
        block_list:
          type: array
          items:
            $ref: "#/components/schemas/VaultBlock"

    VaultBlock:
      type: object
      properties:
        block_id:
          type: string
        source_path:
          type: string
        risk_class:
          type: string
          enum: [low, medium, high]
        raw_tokens:
          type: integer

    VaultIndexSummary:
      type: object
      properties:
        available:
          type: boolean
        blocks:
          type: integer
        path:
          type: string

    # ── Metrics ───────────────────────────────────────────────────────────────

    DashboardMetrics:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        uptime_seconds:
          type: integer
        requests:
          type: object
          properties:
            total:
              type: integer
            throughput_req_per_sec:
              type: number
        latency:
          type: object
          properties:
            p50_ms:
              type: number
            p95_ms:
              type: number
            p99_ms:
              type: number
            avg_ms:
              type: number
            samples:
              type: integer
        cache:
          type: object
          properties:
            hit_ratio:
              type: number
            read_tokens:
              type: integer
            creation_tokens:
              type: integer
        errors:
          type: object
          properties:
            error_rate:
              type: number
            error_count:
              type: integer
            top_failures:
              type: object
        models:
          type: object
          additionalProperties:
            type: object

    # ── Degradation ───────────────────────────────────────────────────────────

    DegradationState:
      type: object
      properties:
        is_degraded:
          type: boolean
        mode:
          type: string
        recent_events:
          type: array
          items:
            type: object
            properties:
              timestamp:
                type: string
                format: date-time
              detail:
                type: string

    CircuitBreakerRegistry:
      type: object
      properties:
        enabled:
          type: boolean
        circuit_breakers:
          type: object
          additionalProperties:
            type: object
            properties:
              open:
                type: boolean
              failures:
                type: integer
              last_failure:
                type: string
                format: date-time

    # ── Ingest ────────────────────────────────────────────────────────────────

    IngestRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
          description: Document text to ingest
        source_path:
          type: string
          description: Logical path for this document (used as block ID)
        risk_class:
          type: string
          enum: [low, medium, high]
          default: low

    IngestResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        block_id:
          type: string
        tokens:
          type: integer

    IngestBatchRequest:
      type: object
      required: [documents]
      properties:
        documents:
          type: array
          items:
            $ref: "#/components/schemas/IngestRequest"

    IngestBatchResponse:
      type: object
      properties:
        status:
          type: string
        ingested:
          type: integer
        errors:
          type: integer
        results:
          type: array
          items:
            $ref: "#/components/schemas/IngestResponse"

    # ── Errors ────────────────────────────────────────────────────────────────

    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          required: [type, message]
          properties:
            type:
              type: string
              example: not_found
            message:
              type: string
              example: No trace found for request_id

  responses:
    RateLimitExceeded:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              type: rate_limit_exceeded
              message: "Too many requests. Limit: 600 req/min per IP."

    UpstreamError:
      description: Upstream provider error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
