[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "tokenpak"
version = "1.0.0"
description = "Slash LLM costs with intelligent context compression, smart routing, and cost tracking"
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.10"
authors = [
  { name = "Kevin Yang", email = "kaywhy331@gmail.com" }
]
maintainers = [
  { name = "Kevin Yang", email = "kaywhy331@gmail.com" }
]
keywords = [
  "llm",
  "ai",
  "proxy",
  "token-optimization",
  "openai",
  "anthropic",
  "compression",
  "context",
  "context-window",
  "tokens",
  "cost-tracking",
  "routing",
]
classifiers = [
  "Development Status :: 5 - Production/Stable",
  "Intended Audience :: Developers",
  "Intended Audience :: Science/Research",
  "License :: OSI Approved :: MIT License",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Scientific/Engineering :: Artificial Intelligence",
  "Topic :: Software Development :: Libraries :: Python Modules",
  "Topic :: Internet :: WWW/HTTP :: HTTP Servers",
  "Topic :: System :: Networking",
  "Topic :: Utilities",
  "Typing :: Typed",
]

dependencies = [
  "aiohttp>=3.9.0",
  "pyyaml>=6.0",
  "click>=8.1.0",
  "starlette>=0.36.0",
  "uvicorn>=0.27.0",
  "httpx>=0.26.0",
  "h2>=3,<5",
  "watchdog>=3.0.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=7.0",
  "pytest-asyncio>=0.23.0",
  "pytest-cov>=4.1.0",
  "pytest-benchmark>=4.0.0",
  "black>=24.0.0",
  "ruff>=0.2.0",
]
tokens = ["tiktoken>=0.5.0"]
docs = [
  "mkdocs>=1.5.0",
  "mkdocs-material>=9.5.0",
]

[project.urls]
Homepage = "https://github.com/kaywhy331/tokenpak"
Documentation = "https://github.com/kaywhy331/tokenpak/blob/master/README.md"
"Bug Reports" = "https://github.com/kaywhy331/tokenpak/issues"
"Source Code" = "https://github.com/kaywhy331/tokenpak"
Changelog = "https://github.com/kaywhy331/tokenpak/blob/master/CHANGELOG.md"

[project.scripts]
tokenpak = "tokenpak.cli:main"
tokenpak-admin = "tokenpak.agent.license.admin_cli:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["tokenpak*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]

[tool.black]
line-length = 100
target-version = ["py310", "py311", "py312"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = [
  "E501",   # line too long (handled by black)
  "E701",   # multiple statements on one line (colon) — intentional compact style
  "E702",   # multiple statements on one line (semicolon) — intentional compact style
  "E402",   # module import not at top — conditional/optional imports
  "E741",   # ambiguous variable name — acceptable in short-scope contexts
  "F841",   # local variable assigned but never used — may be for side effects
]
