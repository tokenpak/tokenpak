[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "tokenpak"
version = "0.1.0"
description = "Universal content compiler for LLM context optimization"
readme = "README.md"
requires-python = ">=3.10"
authors = [
  { name = "TokenPak Team" }
]
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=7.0"]
tokens = ["tiktoken>=0.5.0"]

[project.scripts]
tokenpak = "tokenpak.cli:main"
tokenpak-admin = "tokenpak.agent.license.admin_cli:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["tokenpak*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
