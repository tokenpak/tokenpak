openapi: "3.1.0"

info:
  title: TokenPak Proxy API
  version: "1.0.2"
  description: |
    TokenPak is a drop-in HTTP proxy that sits between your app and LLM APIs.
    It compresses requests, deduplicates cache hits, and tracks token spend —
    with zero SDK changes required.

    ## Usage

    Point your LLM client at `http://localhost:8766` instead of the provider endpoint:

    ```bash
    ANTHROPIC_BASE_URL=http://localhost:8766 claude-code ...
    OPENAI_BASE_URL=http://localhost:8766/v1 openai ...
    ```

    ## Authentication

    The proxy forwards your API key to the upstream provider. Set the standard
    provider environment variables (`ANTHROPIC_API_KEY`, `OPENAI_API_KEY`, etc.)
    or pass them in the `Authorization` / `x-api-key` header as usual.

  contact:
    name: TokenPak
    url: https://github.com/kaywhy331/tokenpak
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0

servers:
  - url: http://localhost:8766
    description: Local proxy (default port)

tags:
  - name: passthrough
    description: LLM API passthrough (forwarded to upstream providers)
  - name: health
    description: Proxy health and readiness
  - name: stats
    description: Request and token usage statistics
  - name: traces
    description: Per-request pipeline trace inspection
  - name: cache
    description: Cache statistics and management
  - name: vault
    description: Vault index diagnostics
  - name: metrics
    description: Prometheus and dashboard metrics
  - name: ingest
    description: Document ingestion into vault context
  - name: degradation
    description: Circuit breaker and degradation state

paths:

  # ─── LLM Passthrough ──────────────────────────────────────────────────────

  /v1/messages:
    post:
      operationId: createMessage
      summary: Anthropic Messages API (passthrough)
      description: |
        Drop-in replacement for the Anthropic `/v1/messages` endpoint.
        TokenPak compresses the context before forwarding, then returns the
        upstream response unchanged.
      tags: [passthrough]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnthropicMessagesRequest"
            example:
              model: claude-sonnet-4-5
              max_tokens: 1024
              messages:
                - role: user
                  content: Hello, world!
      responses:
        "200":
          description: Upstream Anthropic response (unmodified)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicMessagesResponse"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"
        "502":
          $ref: "#/components/responses/UpstreamError"

  /v1/chat/completions:
    post:
      operationId: createChatCompletion
      summary: OpenAI Chat Completions API (passthrough)
      description: |
        Drop-in replacement for the OpenAI `/v1/chat/completions` endpoint.
        Supports streaming (`stream: true`).
      tags: [passthrough]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenAIChatRequest"
            example:
              model: gpt-4o
              messages:
                - role: user
                  content: What is the capital of France?
      responses:
        "200":
          description: OpenAI chat completion response (unmodified)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenAIChatResponse"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"
        "502":
          $ref: "#/components/responses/UpstreamError"

  # ─── Health ───────────────────────────────────────────────────────────────

  /health:
    get:
      operationId: getHealth
      summary: Proxy health check
      description: |
        Returns the current health of the proxy, including vault index state,
        router status, circuit breaker state, and session stats.
        Response is cached for 1 second to reduce overhead.
      tags: [health]
      responses:
        "200":
          description: Proxy is running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: ok
                compilation_mode: hybrid
                vault_index:
                  available: true
                  blocks: 2943
                  path: /home/user/.tokenpak
                router:
                  enabled: true
                budget:
                  enabled: true
                  total_tokens: 0
                stats:
                  requests: 42
                  saved_tokens: 18500
                  errors: 0

  # ─── Stats ────────────────────────────────────────────────────────────────

  /stats:
    get:
      operationId: getStats
      summary: Full session statistics
      description: Returns complete stats including session totals, vault index state, recent requests, and per-model breakdown.
      tags: [stats]
      responses:
        "200":
          description: Full stats object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsResponse"

  /stats/last:
    get:
      operationId: getLastRequestStats
      summary: Last request statistics
      description: Returns per-request stats for the most recently processed request.
      tags: [stats]
      responses:
        "200":
          description: Last request stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LastRequestStats"
              example:
                request_id: req_abc123
                timestamp: "2026-03-25T09:00:00Z"
                model: claude-sonnet-4-5
                tokens_saved: 420
                percent_saved: 32.1
                cost_saved: 0.0012
                session_total_saved: 0.0452
                session_requests: 14
                input_tokens_raw: 1310
                input_tokens_sent: 890
                output_tokens: 256

  /stats/session:
    get:
      operationId: getSessionStats
      summary: Session aggregate statistics
      description: Returns aggregated stats for the current proxy session.
      tags: [stats]
      responses:
        "200":
          description: Session stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionStats"

  /recent:
    get:
      operationId: getRecentRequests
      summary: Recent 50 requests
      description: Returns metadata for the 50 most recent requests processed by the proxy.
      tags: [stats]
      responses:
        "200":
          description: Recent requests list
          content:
            application/json:
              schema:
                type: object
                properties:
                  recent:
                    type: array
                    items:
                      $ref: "#/components/schemas/RequestSummary"

  # ─── Traces ───────────────────────────────────────────────────────────────

  /traces:
    get:
      operationId: listTraces
      summary: List all pipeline traces
      description: Returns all captured request pipeline traces (compression, injection, routing steps).
      tags: [traces]
      responses:
        "200":
          description: Trace list
          content:
            application/json:
              schema:
                type: object
                properties:
                  traces:
                    type: array
                    items:
                      $ref: "#/components/schemas/Trace"
                  count:
                    type: integer

  /trace/last:
    get:
      operationId: getLastTrace
      summary: Last request pipeline trace
      description: Returns the full pipeline trace for the most recently processed request.
      tags: [traces]
      responses:
        "200":
          description: Trace object or not-found error
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Trace"
                  - $ref: "#/components/schemas/ErrorResponse"

  /trace/{request_id}:
    get:
      operationId: getTraceById
      summary: Pipeline trace by request ID
      description: Returns the full pipeline trace for a specific request ID.
      tags: [traces]
      parameters:
        - name: request_id
          in: path
          required: true
          schema:
            type: string
          example: req_abc123
      responses:
        "200":
          description: Trace object or not-found error
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Trace"
                  - $ref: "#/components/schemas/ErrorResponse"

  # ─── Cache ────────────────────────────────────────────────────────────────

  /cache-stats:
    get:
      operationId: getCacheStats
      summary: Cache statistics
      description: Returns cache hit/miss counts, token savings, and efficiency metrics.
      tags: [cache]
      responses:
        "200":
          description: Cache statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CacheStats"

  # ─── Vault ────────────────────────────────────────────────────────────────

  /vault:
    get:
      operationId: getVaultIndex
      summary: Vault index debug info
      description: Returns the current state of the vault index including all loaded blocks.
      tags: [vault]
      responses:
        "200":
          description: Vault index state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VaultInfo"

  # ─── Metrics ──────────────────────────────────────────────────────────────

  /metrics:
    get:
      operationId: getPrometheusMetrics
      summary: Prometheus metrics
      description: Returns counters and gauges in Prometheus text format (text/plain).
      tags: [metrics]
      responses:
        "200":
          description: Prometheus text format metrics
          content:
            text/plain:
              schema:
                type: string
              example: |
                # HELP tokenpak_requests_total Total requests processed
                # TYPE tokenpak_requests_total counter
                tokenpak_requests_total 42

  /metrics/dashboard:
    get:
      operationId: getDashboardMetrics
      summary: Comprehensive dashboard metrics (JSON)
      description: |
        Returns 8 key metrics in a single JSON response suitable for dashboards:
        request count + throughput, latency histogram, model distribution,
        routing decisions, cache hit ratio, error rate, streaming count,
        and 24-hour rolling window stats.
      tags: [metrics]
      responses:
        "200":
          description: Dashboard metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardMetrics"

  # ─── Degradation / Circuit Breakers ───────────────────────────────────────

  /degradation:
    get:
      operationId: getDegradationState
      summary: Degradation and circuit breaker state
      description: Returns whether the proxy is operating in degraded mode and details of any recent degradation events.
      tags: [degradation]
      responses:
        "200":
          description: Degradation state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DegradationState"

  /circuit-breakers:
    get:
      operationId: getCircuitBreakers
      summary: Circuit breaker status for all providers
      description: Returns enabled state and per-provider circuit breaker open/closed status.
      tags: [degradation]
      responses:
        "200":
          description: Circuit breaker registry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CircuitBreakerRegistry"

  # ─── Ingest ───────────────────────────────────────────────────────────────

  /ingest:
    post:
      operationId: ingestDocument
      summary: Ingest a document into vault context
      description: Parses and indexes a document (text, markdown, code, etc.) into the vault for context injection.
      tags: [ingest]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IngestRequest"
            example:
              content: "# My Document\nThis is the content to index."
              source_path: /home/user/docs/my-doc.md
              risk_class: low
      responses:
        "200":
          description: Ingest result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /ingest/batch:
    post:
      operationId: ingestBatch
      summary: Batch ingest multiple documents
      description: Ingest multiple documents in a single request.
      tags: [ingest]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IngestBatchRequest"
      responses:
        "200":
          description: Batch ingest results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestBatchResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  # ─── Interactive Docs ─────────────────────────────────────────────────────

  /docs:
    get:
      operationId: getSwaggerUI
      summary: Interactive API documentation (Swagger UI)
      description: Serves a Swagger UI page for browsing and testing the API.
      tags: [health]
      responses:
        "200":
          description: Swagger UI HTML page
          content:
            text/html:
              schema:
                type: string


# ─── Components ─────────────────────────────────────────────────────────────

components:
  schemas:

    # ── LLM passthrough schemas ──────────────────────────────────────────────

    AnthropicMessagesRequest:
      type: object
      required: [model, max_tokens, messages]
      properties:
        model:
          type: string
          example: claude-sonnet-4-5
        max_tokens:
          type: integer
          example: 1024
        messages:
          type: array
          items:
            $ref: "#/components/schemas/Message"
        system:
          type: string
        stream:
          type: boolean
          default: false
        temperature:
          type: number
          minimum: 0
          maximum: 1
        top_p:
          type: number

    AnthropicMessagesResponse:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          example: message
        role:
          type: string
          example: assistant
        content:
          type: array
          items:
            type: object
        model:
          type: string
        stop_reason:
          type: string
        usage:
          $ref: "#/components/schemas/AnthropicUsage"

    AnthropicUsage:
      type: object
      properties:
        input_tokens:
          type: integer
        output_tokens:
          type: integer
        cache_read_input_tokens:
          type: integer
        cache_creation_input_tokens:
          type: integer

    OpenAIChatRequest:
      type: object
      required: [model, messages]
      properties:
        model:
          type: string
          example: gpt-4o
        messages:
          type: array
          items:
            $ref: "#/components/schemas/Message"
        stream:
          type: boolean
          default: false
        temperature:
          type: number
        max_tokens:
          type: integer
        top_p:
          type: number

    OpenAIChatResponse:
      type: object
      properties:
        id:
          type: string
        object:
          type: string
          example: chat.completion
        created:
          type: integer
        model:
          type: string
        choices:
          type: array
          items:
            type: object
        usage:
          type: object

    Message:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          enum: [user, assistant, system]
        content:
          oneOf:
            - type: string
            - type: array
              items:
                type: object

    # ── Health ────────────────────────────────────────────────────────────────

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        compilation_mode:
          type: string
          enum: [hybrid, compression-only, passthrough]
        vault_index:
          $ref: "#/components/schemas/VaultIndexSummary"
        router:
          type: object
          properties:
            enabled:
              type: boolean
        capsule_available:
          type: boolean
        budget:
          type: object
          properties:
            enabled:
              type: boolean
            total_tokens:
              type: integer
        circuit_breakers:
          type: object
          additionalProperties:
            type: object
            properties:
              open:
                type: boolean
              failures:
                type: integer
        stats:
          $ref: "#/components/schemas/SessionStatsSummary"

    # ── Stats ─────────────────────────────────────────────────────────────────

    StatsResponse:
      type: object
      properties:
        session:
          type: object
        compilation_mode:
          type: string
        vault_index:
          $ref: "#/components/schemas/VaultIndexSummary"
        router:
          type: object
        today:
          type: object
        by_model:
          type: object
        recent:
          type: array
          items:
            $ref: "#/components/schemas/RequestSummary"

    LastRequestStats:
      type: object
      properties:
        request_id:
          type: string
        timestamp:
          type: string
          format: date-time
        model:
          type: string
        tokens_saved:
          type: integer
        percent_saved:
          type: number
        cost_saved:
          type: number
        session_total_saved:
          type: number
        session_requests:
          type: integer
        input_tokens_raw:
          type: integer
        input_tokens_sent:
          type: integer
        output_tokens:
          type: integer

    SessionStats:
      type: object
      properties:
        session_requests:
          type: integer
        session_total_saved:
          type: number
        tokens_saved:
          type: integer
        tokens_sent:
          type: integer
        tokens_raw:
          type: integer
        output_tokens:
          type: integer
        total_cost:
          type: number
        uptime_hours:
          type: number
        errors:
          type: integer
        avg_savings_pct:
          type: number

    SessionStatsSummary:
      type: object
      properties:
        requests:
          type: integer
        input_tokens:
          type: integer
        sent_input_tokens:
          type: integer
        saved_tokens:
          type: integer
        errors:
          type: integer
        cache_hits:
          type: integer
        cost:
          type: number

    RequestSummary:
      type: object
      properties:
        request_id:
          type: string
        timestamp:
          type: string
          format: date-time
        model:
          type: string
        latency_ms:
          type: number
        status_code:
          type: integer
        tokens_saved:
          type: integer

    # ── Traces ────────────────────────────────────────────────────────────────

    Trace:
      type: object
      properties:
        request_id:
          type: string
        timestamp:
          type: string
          format: date-time
        model:
          type: string
        pipeline_steps:
          type: array
          items:
            type: object
        input_tokens_raw:
          type: integer
        input_tokens_sent:
          type: integer
        output_tokens:
          type: integer

    # ── Cache ─────────────────────────────────────────────────────────────────

    CacheStats:
      type: object
      properties:
        hits:
          type: integer
        misses:
          type: integer
        hit_ratio:
          type: number
        read_tokens:
          type: integer
        creation_tokens:
          type: integer
        total_savings_usd:
          type: number

    # ── Vault ─────────────────────────────────────────────────────────────────

    VaultInfo:
      type: object
      properties:
        available:
          type: boolean
        blocks:
          type: integer
        total_tokens:
          type: integer
        path:
          type: string
        block_list:
          type: array
          items:
            $ref: "#/components/schemas/VaultBlock"

    VaultBlock:
      type: object
      properties:
        block_id:
          type: string
        source_path:
          type: string
        risk_class:
          type: string
          enum: [low, medium, high]
        raw_tokens:
          type: integer

    VaultIndexSummary:
      type: object
      properties:
        available:
          type: boolean
        blocks:
          type: integer
        path:
          type: string

    # ── Metrics ───────────────────────────────────────────────────────────────

    DashboardMetrics:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        uptime_seconds:
          type: integer
        requests:
          type: object
          properties:
            total:
              type: integer
            throughput_req_per_sec:
              type: number
        latency:
          type: object
          properties:
            p50_ms:
              type: number
            p95_ms:
              type: number
            p99_ms:
              type: number
            avg_ms:
              type: number
            samples:
              type: integer
        cache:
          type: object
          properties:
            hit_ratio:
              type: number
            read_tokens:
              type: integer
            creation_tokens:
              type: integer
        errors:
          type: object
          properties:
            error_rate:
              type: number
            error_count:
              type: integer
            top_failures:
              type: object
        models:
          type: object
          additionalProperties:
            type: object

    # ── Degradation ───────────────────────────────────────────────────────────

    DegradationState:
      type: object
      properties:
        is_degraded:
          type: boolean
        mode:
          type: string
        recent_events:
          type: array
          items:
            type: object
            properties:
              timestamp:
                type: string
                format: date-time
              detail:
                type: string

    CircuitBreakerRegistry:
      type: object
      properties:
        enabled:
          type: boolean
        circuit_breakers:
          type: object
          additionalProperties:
            type: object
            properties:
              open:
                type: boolean
              failures:
                type: integer
              last_failure:
                type: string
                format: date-time

    # ── Ingest ────────────────────────────────────────────────────────────────

    IngestRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
          description: Document text to ingest
        source_path:
          type: string
          description: Logical path for this document (used as block ID)
        risk_class:
          type: string
          enum: [low, medium, high]
          default: low

    IngestResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        block_id:
          type: string
        tokens:
          type: integer

    IngestBatchRequest:
      type: object
      required: [documents]
      properties:
        documents:
          type: array
          items:
            $ref: "#/components/schemas/IngestRequest"

    IngestBatchResponse:
      type: object
      properties:
        status:
          type: string
        ingested:
          type: integer
        errors:
          type: integer
        results:
          type: array
          items:
            $ref: "#/components/schemas/IngestResponse"

    # ── Errors ────────────────────────────────────────────────────────────────

    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          required: [type, message]
          properties:
            type:
              type: string
              example: not_found
            message:
              type: string
              example: No trace found for request_id

  responses:
    RateLimitExceeded:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              type: rate_limit_exceeded
              message: "Too many requests. Limit: 600 req/min per IP."

    UpstreamError:
      description: Upstream provider error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
